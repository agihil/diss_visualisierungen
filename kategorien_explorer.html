<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><title>Taxonomie der Figurenaußenseite</title><style>
:root{--fg:#111827;--muted:#9aa1ab;--line:#e5e7eb;--accent:#2563eb;--attr:#2c7a7b;--bg:#fafafa;--panel:#fff;}
*{box-sizing:border-box;}
body{margin:0;font-family:ui-sans-serif,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;color:var(--fg);background:var(--bg);line-height:1.5;}
header{padding:1.4rem 1.6rem .4rem;}
header h1{font-size:1.2rem;margin:0;}
.legend{font-size:.8rem;color:var(--muted);margin:.45rem 0 .15rem;}
.legend span{margin-right:1.3rem;white-space:nowrap;}
.legend .k{color:var(--fg);} .legend .a{color:var(--attr);}
.cols{display:flex;gap:1.6rem;align-items:flex-start;padding:.8rem 1.6rem 2.5rem;}
#tree{flex:1 1 380px;max-width:520px;}
ul{list-style:none;margin:0;padding:0;}
.children{padding-left:1rem;border-left:1px solid var(--line);margin-left:.55rem;}
.children.hidden{display:none;}
.row{display:flex;align-items:center;padding:.07rem 0;}
.tog{width:1.2em;text-align:center;color:var(--muted);cursor:pointer;user-select:none;font-size:.78em;}
.lab{cursor:pointer;border-radius:5px;padding:.06rem .4rem;}
.lab.attr{color:var(--attr);}
.lab.muted{color:var(--muted);}
.lab:hover{background:#eef2f7;}
.lab.sel{background:var(--accent);color:#fff;}
#detail{display:none;flex:1 1 340px;position:sticky;top:1rem;background:var(--panel);border:1px solid var(--line);border-radius:0;padding:1.1rem 1.3rem;}
#detail.open{display:block;}
#detail .head{margin:0 0 .9rem;}
#detail h2{font-size:1.05rem;margin:0;}
#detail .subtitle{color:var(--muted);font-size:.9rem;margin:.1rem 0 0;}
.meta{margin:0 0 .8rem;font-size:.92rem;}
.meta .k{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.12rem;}
.meta ul{list-style:disc;padding-left:1.1rem;margin:.2rem 0 0;}
.ph{color:var(--muted);font-style:italic;}
</style></head><body><header><h1>Taxonomie der Figurenaußenseite</h1><p class="legend"><span class="k">▪ Komponenten</span><span class="a">▪ Attribute</span><span>▪ noch nicht ausgestaltet</span></p></header><div class="cols"><ul id="tree"></ul><div id="detail"></div></div><script>
var DATA={"nodes": {"body::torsos": {"l": "torsos", "def": "Region Rumpf — übergeordnete Kategorie für alle Rumpfteile", "de": "", "ex": []}, "body::nose bridges": {"l": "nose bridges", "def": "Nasenrücken", "de": "", "ex": []}, "dress::veils": {"l": "veils", "def": "“Thin and lightweight coverings worn over the head or face, and sometimes extending to the shoulders, for ornament, protection, or concealment; also, similar coverings made as component parts of headgear.” (AAT)", "de": "", "ex": []}, "dress::technique": {"l": "technique", "def": "Art und Weise der Herstellung der Komponente oder des Attributs, z.B. handgemacht, gestrickt, genäht, gestickt usw", "de": "", "ex": ["“[...] die blaue Jacke an den Rändern mit bunter Seide gestickt [...]” Hinweis zum", "“gestickt” hier als trimming und technique annotiert"]}, "body::inner qualities": {"l": "inner qualities", "def": "Inneres Merkmal (Temperament, Charakter, Gemütslage), das explizit an die Außenseite gebunden wird. Hinweis: Wir meinen hier nur solche Fälle, in denen innere Eigenschaften explizit an die sinnlich wahrnehmbare Außenseite geknüpft werden. „Er war ein stolzer Mensch\" fällt damit nicht in diese Kategorie, „Er hatte ein stolzes Gesicht\" dagegen schon", "de": "", "ex": ["eine kecke Stupsnase in dem lustigen Kindergesicht", "Er hat ein gutmütiges, hageres, dunkelbraungebranntes Gesicht [...]"]}, "dress::place": {"l": "place", "def": "Attributes indicating the geographical origin or regional association of a garment. Examples: „Viennese fashion“, „imported from Paris”, „Italian style\"", "de": "", "ex": []}, "dress::quantity": {"l": "quantity", "def": "Die Menge eines Körperteils oder der Elemente, aus denen es besteht. Annotiert werden Aussagen über Menge, Anzahl oder Fülle", "de": "", "ex": ["reiches Haar, viele Sommersprossen, reichlich Muskeln, wenige Falten, vier Finger"]}, "body::group-related general": {"l": "group-related general", "def": "Markierung eines Körpers oder Körperteils als spezifisch für eine soziale Gruppe. Der Tag group-related general wird dann vergeben, wenn es um eine sehr allgemein gehaltene Gruppe, nicht um eine spezifische soziale Gruppe geht", "de": "", "ex": ["Sie sah aus, als gehöre sie nicht hierher", "eine fremdartige Erscheinung"]}, "dress::placement": {"l": "placement", "def": "Die Stelle, an der ein Körperteil oder ein Merkmal an einem anderen Körperteil lokalisiert ist", "de": "", "ex": ["ein Muttermal auf der linken Wange"]}, "body::skin color": {"l": "skin color", "def": "“Hautfarbe” als soziales Konstrukt betrachten wir als zwar (noch) sinnlich wahrnehmbar aber als distinkt von rein sinnlichen Farb-Ausdrücken. Anders als solche Farb-Ausdrücke ist Hautfarbe kulturell überformt und bezieht sich auf mehr als einen reinen Farb-Ausdruck", "de": "", "ex": []}, "dress::weapons": {"l": "weapons", "def": "“Refers generally to that category of costume designed to or carried to protect the body in combat.\"” (angelehnt an AAT) Hinweis: Waffen und Rüstungen werden grundsätzlich als Grenzfall von Dress betrachtet. Zu behandeln ist dieser wie in den Guidelines zur Figurenbeschreibung: “Explizite Erwähnungen von Waffen betrachten wir dann als hinreichend für äußere Figurenbeschreibung, wenn sie als Teil des ‘Outfits’ einer Figur erscheinen. Typisch ist dann, dass die Figur die Waffen am Körper trägt und/oder dass auch andere Aspekte der Außenseite bzw. der Kleidung beschrieben werden. Wir betrachten solche Erwähnungen nicht als hinreichend für äußere Figurenbeschreibung, wenn der Fokus primär auf der Benutzung der Waffen (im Kampf) oder auf der Bewaffnung liegt.”", "de": "", "ex": ["Er trug die Kleidung eines Westläufers, hatte eine Flinte auf dem Rücken hängen und in dem Gürtel einen Revolver, ein Bowiemesser und – – – was noch mehr stecken?"]}, "body::chests": {"l": "chests", "def": "Brust (vorderer Oberkörper)", "de": "", "ex": []}, "dress::ponchos": {"l": "ponchos", "def": "“Blanketlike garments, usually square or oblong with a slit in the center for the head, originating in South America. Also, similar garments used elsewhere, including those made of water-repellent fabric and usually having a hood, and when not worn, used as a blanket or tarpaulin.” (AAT)", "de": "", "ex": []}, "dress::hems": {"l": "hems", "def": "Finished edge of a cloth article, such as a skirt, sleeve, or curtain fashioned by rolling up or folding back an edge and stitching it down.” (AAT) Deutsch: Säume, Ränder", "de": "", "ex": []}, "body::skin": {"l": "skin", "def": "Die Haut als sichtbare Oberfläche des Körpers oder Körperteils", "de": "", "ex": ["die rissige Haut seiner Hände"]}, "body::scars": {"l": "scars", "def": "Narben an einem Körperteil als dauerhaft sichtbares Merkmal", "de": "", "ex": ["eine Narbe auf der Wange, narbige Hände"]}, "dress::headwear": {"l": "headwear", "def": "“Any covering for the head.” (AAT) Hinweis: Den Wert “headwear general” vergeben wir, wenn es allgemein um die Kopfbedeckung geht, ohne dass spezifiziert wird, welche Art von Kopfbedeckung (Mütze, Hut o.Ä.) es ist", "de": "", "ex": ["05, 10"]}, "body::hands": {"l": "hands", "def": "Hände", "de": "", "ex": []}, "dress::helmets": {"l": "helmets", "def": "“Any of various forms of protective coverings for the head, usually made of a hard material, including the outside steel layer of helmets that consist of inner and outer parts.” (AAT)", "de": "", "ex": []}, "body::temperature": {"l": "temperature", "def": "Die Körpertemperatur oder Körperteiltemperatur. Hinweis: gemeint ist hier nur die explizite, wörtliche Temperatur, keine metaphorische Wärme oder Kälte (warmer Blick)", "de": "", "ex": ["warme Hände"]}, "body::gait": {"l": "gait", "def": "Charakteristische Art der Fortbewegung — wie eine Figur typischerweise geht", "de": "", "ex": ["schleppender Gang, federnder Schritt, wiegender Gang, hinkend. Abgrenzung: nur als habituelles Merkmal annotieren, nicht das einmalige Gehen in einer Erzählsituation"]}, "body::color value": {"l": "color value", "def": "Der Grad der Helligkeit oder Dunkelheit eines Farbtons. Wird nur zusammen mit Farbe annotiert. Hinweis: Wenn es um Helligkeit/Dunkelheit eines Körperteils jenseits der Farbe geht, wird brightness annotiert", "de": "", "ex": ["dunkelbraunes Haar"]}, "dress::pattern": {"l": "pattern", "def": "“Each ornamental design, either on a flat surface or in relief, composed of repeated or combined motifs.” (CC) Hinweis: Kann mit Farbe kombiniert sein. (rot und weiß gestreift). Dann sind Farbe und pattern zu annotieren", "de": "", "ex": ["“Die kurzen Beine waren in großkarrierte Hosen gesteckt [...]”", "Nie hatte er den geblümten, seidenen Schlafrock so oft getragen, wie jetzt"]}, "dress::width": {"l": "width", "def": "Die Breite eines Körperteils in der Querrichtung", "de": "", "ex": ["breite Schultern, schmale Hüften, schmaler Mund"]}, "body::hairstyles specific": {"l": "hairstyles specific", "def": "Den specific-Tag vergeben wir bei Erwähnung spezifischer Frisuren (z.B. Zöpfe, Haarkranz) Abgrenzung: Beschreibungen der Frisur über Attribute erfassen wir über “body modification attributes” (z.B. gekämmt, geflochten)", "de": "", "ex": []}, "body::other parts of heads": {"l": "other parts of heads", "def": "Sammelkategorie für Kopfteile, die noch nicht in der Taxonomie berücksichtigt sind", "de": "", "ex": []}, "dress::dresses": {"l": "dresses", "def": "“Main garments for women, children, or infants consisting of a bodice and skirt made in one or more pieces.” (AAT)", "de": "", "ex": ["Sie trug ein rotes Kleid von feinem Wollstoff"]}, "dress::stains": {"l": "stains", "def": "Flecken auf einem Kleidungsstück als lokalisierbares Merkmal. Deutsch: Flecken", "de": "Flecken", "ex": []}, "body::impressiveness/presence": {"l": "impressiveness/presence", "def": "Impressivität, Stattlichkeit eines Körpers oder Körperteils", "de": "", "ex": ["[...] einen um das Kinn gehenden stattlichen Bart [...]"]}, "dress::muffs": {"l": "muffs", "def": "“Tubular coverings for the hands, often open at both ends, worn for warmth.” (AAT)", "de": "", "ex": []}, "dress::aesthetic": {"l": "aesthetic", "def": "Attributes expressing an aesthetic judgment based on internalized standards of taste or beauty. Examples: „elegant“, „tasteful”, „stylish“, „ugly”", "de": "", "ex": ["sie trug ein elegantes, aber unordentlich zerknittertes Negligé"]}, "body::color and color-related": {"l": "color and color-related", "def": "Hinweis: color and color-related general wird annotiert, wenn sich die Beschreibung auf die Farbe allgemein bezieht ohne direkte Informationen wie in den Subhierarchien spezifiziert", "de": "", "ex": ["Ihre Haut hatte die Farbe eines warmen Sommertags"]}, "dress::watches": {"l": "watches", "def": "“Timepieces small and convenient enough to be carried about on a person.” (AAT)", "de": "", "ex": []}, "body::foreheads": {"l": "foreheads", "def": "Stirn", "de": "", "ex": []}, "dress::badges": {"l": "badges", "def": "“Objects bearing special or distinctive marks and worn for decoration or to signify affiliation. Originally, badges were heraldic symbols worn as identifying marks by a knight and his retainers, e.g., a badge of arms. In later use, the term refers to any distinctive device, emblem, or mark worn to indicate a person's affiliation, rank, office, name, or membership in an organization or support for a cause, particularly objects that comprise small pieces of metal, card, plastic, etc., that bear a distinguishing design or words.” (AAT)", "de": "", "ex": []}, "dress::gloves": {"l": "gloves", "def": "“Coverings for the hand enclosing each finger separately, sometimes extending over the wrist and arm.” (AAT)", "de": "", "ex": []}, "body::shoulderblades": {"l": "shoulderblades", "def": "Schulterblätter", "de": "", "ex": []}, "body::posture": {"l": "posture", "def": "Habituelle Körperhaltung (Stand- und Sitzhaltung, Schulter- und Rückenführung)", "de": "", "ex": ["aufrechte Haltung, mit hängenden Schultern, gebeugt, stets gerade. Abgrenzung zu shape (close attribute): Eine gebeugte Haltung ist habituell-dynamisch (posture); ein gekrümmter Rücken als anatomisches Merkmal ist statisch und wird als shape am Körperteil backs annotiert. Faustregel: Wenn die Beschreibung eine Art sich zu halten meint, ist es posture; wenn sie eine Form/Beschaffenheit des Körpers meint, ist es shape"]}, "dress::way of wearing immediate": {"l": "way of wearing immediate", "def": "Art und Weise, wie das Kleidungsstück oder Kleidungsteilstück von der Figur getragen wird. Hinweis: Placement und andere eigene Kategorien, bei denen man ebenfalls etwas über die Art und Weise des Getragen werdens erfährt (z.B. placement9 werden eigens erfasst und nicht zusätzlich mit way of wearing", "de": "", "ex": ["Er war so ein Mann, der gerne den Rock weit offen trägt, [...]"]}, "body::dimples": {"l": "dimples", "def": "Grübchen an einem Körperteil als sichtbares Merkmal", "de": "", "ex": ["Grübchen in den Wangen"]}, "dress::other function-related": {"l": "other function-related", "def": "Function-related attributes not captured by the defined subcategories", "de": "", "ex": []}, "dress::color-related properties": {"l": "color-related properties", "def": "Typische farbbezogene Eigenschaften wie schwach, stark, tief, warm, kalt, blass usw. (außer color value, da dieser als eigene Kategorie erfasst wird). Hinweis: Wird nur zusammen mit Farbe annotiert", "de": "", "ex": []}, "dress::other clothing for the lower body": {"l": "other clothing for the lower body", "def": "", "de": "", "ex": []}, "body::ears": {"l": "ears", "def": "Ohren", "de": "", "ex": []}, "dress::colors level 1": {"l": "colors level 1", "def": "Mit colors level 1 annotieren wir basale, einfache, also nicht zusammengesetzte Farbtöne: blau, rot, gelb, grün, orange, pink, lila, türkis, schwarz, weiß, grau, braun sowie deren Synonyme und analoge Ausdrücke. Hinweis: Sowohl Farbtöne des Levels 1 als auch des Levels 2 können zusätzlich hinsichtlich des color value oder der anderen farbbezogenen Attribute näher spezifiziert werden", "de": "", "ex": ["schwarzes Haar", "blonde Haare"]}, "body::age specific": {"l": "age specific", "def": "Spezifische Angabe des Alters", "de": "", "ex": []}, "body::tip of tongue": {"l": "tip of tongue", "def": "Zungenspitze", "de": "", "ex": []}, "dress::other accessories carried": {"l": "other accessories carried", "def": "", "de": "", "ex": []}, "body::artificial legs": {"l": "artificial legs", "def": "Künstliche Beine, z.B. Holzbeine", "de": "", "ex": []}, "body::other movement": {"l": "other movement", "def": "Restkategorie für habituelle Bewegungsbeschreibungen, die nicht klar unter gait, gesture oder posture fallen", "de": "", "ex": []}, "body::temples": {"l": "temples", "def": "Schläfen", "de": "", "ex": []}, "dress::cuffs": {"l": "cuffs", "def": "Any of various folds in the fabric or applied or detached bands that serve as a finish or trimming on the arms or legs of items of costume such as blouses, coats, trousers, gloves, or boots, or as costume accessories. Includes cuffs made as separate items in addition to those made as component parts of garments. In an example in a military context, sleeve cuffs may be employed to designate unit or rank.” (AAT) Deutsch: Manschetten", "de": "", "ex": []}, "dress::other group-related": {"l": "other group-related", "def": "Sammelkategorie für Markierungen eines Körpers oder Körperteils als spezifisch für eine andere Art von Gruppe als in den anderen Subkategorien spezifiziert", "de": "", "ex": []}, "dress::group-related general": {"l": "group-related general", "def": "Markierung eines Körpers oder Körperteils als spezifisch für eine soziale Gruppe. Der Tag group-related general wird dann vergeben, wenn es um eine sehr allgemein gehaltene Gruppe, nicht um eine spezifische soziale Gruppe geht", "de": "", "ex": ["Sie sah aus, als gehöre sie nicht hierher", "eine fremdartige Erscheinung"]}, "body::artificiality/naturalness": {"l": "artificiality/naturalness", "def": "Markierung eines Körpers oder seiner Teile bzw. deren Gestaltung als natürlich oder künstlich", "de": "", "ex": []}, "body::throats": {"l": "throats", "def": "Kehle, Vorderseite des Halses", "de": "", "ex": []}, "dress::hats": {"l": "hats", "def": "“Shaped coverings for the head having a brim and crown, or one of the two.” (AAT)", "de": "", "ex": ["[...] er trug einen zimmetfarbigen Samtrock, und sogar auf einen kleinen dreieckigen Hut mit goldnen Borten [...]"]}, "dress::moral/social": {"l": "moral/social", "def": "Markierung als angemessen bzw. unangemessen, anständig, unanständig usw", "de": "", "ex": []}, "body::wrists": {"l": "wrists", "def": "Handgelenke", "de": "", "ex": []}, "dress::shawls": {"l": "shawls", "def": "“Large pieces of square, oblong, or triangular cloth used as garments traditionally for women worn over the shoulders, covering the back, chest, and, sometimes, head. Shawls can be made from cotton or wool, and can be plain or patterned.” (AAT)", "de": "", "ex": []}, "body::hair": {"l": "hair", "def": "Kopfhaar", "de": "", "ex": []}, "dress::coattails": {"l": "coattails", "def": "“Rear flaps of a man's coat, such as on a tail coat, cutaway, or the like.” (AAT) Deutsch: Rockschöße", "de": "Rockschöße", "ex": []}, "dress::other headwear": {"l": "other headwear", "def": "Covering for the head that does not match any of the other terms", "de": "", "ex": []}, "dress::other parts of supplements": {"l": "other parts of supplements", "def": "", "de": "", "ex": []}, "body::type": {"l": "type", "def": "", "de": "", "ex": []}, "dress::color value": {"l": "color value", "def": "Der Grad der Helligkeit oder Dunkelheit eines Farbtons. Wird nur zusammen mit Farbe annotiert. Hinweis: Wenn es um Helligkeit/Dunkelheit eines Körperteils jenseits der Farbe geht, wird brightness annotiert", "de": "", "ex": ["dunkelbraunes Haar"]}, "dress::immediate supplement attributes": {"l": "immediate supplement attributes", "def": "", "de": "", "ex": []}, "dress::capes": {"l": "capes", "def": "“Sleeveless outer garments of varying lengths, fastening at the neck and falling loosely from the shoulders that function as either separate garments or attach to longer coats or cloaks.” (AAT)", "de": "", "ex": []}, "dress::supplement": {"l": "supplement", "def": "Unter “Supplement” verstehen wir den Teil des in der Regel intentional gestalteten äußeren Erscheinungsbildes, bei dem dem Körper etwas Gegenständliches ‘hinzugefügt’ wird – Kleidung oder Accessories. Den Wert “supplement general” vergeben wir, wenn es um die Kleidung der Figur insgesamt geht, wobei wir annehmen, dass sowohl Accessories und Clothing (s.u.) gemeint sind oder gemeint sein könnten", "de": "", "ex": ["Die Räuber trugen die Tracht der Hirten, [...] Erläuterung: Wir können nicht ausschließen, dass zur Tracht der Hirten auch Accessories gehören und annotieren deshalb supplement general", "Er trug die Kleidung eines Westläufers, hatte eine Flinte auf dem Rücken hängen und in dem Gürtel einen Revolver, ein Bowiemesser und – – – was noch mehr stecken? Erläuterung: Auch hier können wir nicht ausschließen, dass zur Kleidung der Westläufer auch Accessoires gehören"]}, "dress::aprons": {"l": "aprons", "def": "“Garments worn over main garments for protection and sometimes ornamentation. Usually cover the front of the body and tie at the waist with strings, but may have a bib or shoulder straps.” (AAT)", "de": "", "ex": []}, "body::smell": {"l": "smell", "def": "Der Geruch eines Körpers oder Körperteils", "de": "", "ex": []}, "body::width": {"l": "width", "def": "Die Breite eines Körperteils in der Querrichtung", "de": "", "ex": ["breite Schultern, schmale Hüften, schmaler Mund"]}, "dress::parasols/umbrellas": {"l": "parasols/umbrellas", "def": "“Portable, usually waterproof canopies consisting of a frame with hinged ribs radiating from a center pole with handle, carried for protection against the weather.” (AAT) “Small umbrellas used as a sunshade or simply carried as a fashionable accessory.” (AAT) Hinweis: Regenschirme annotieren wir ähnlich wie bei den Regeln zu Waffen dann, wenn sie als Teil des Outfits der Figur erscheinen", "de": "", "ex": []}, "dress::other material": {"l": "other material", "def": "Alle Materialien außer Stoffe, z.B. Leder, Stroh, Pelz", "de": "", "ex": ["xyz"]}, "dress::flowers": {"l": "flowers", "def": "Blumen, die als eigenes Accessoire getragen werden", "de": "", "ex": []}, "dress::trains": {"l": "trains", "def": "“Extended parts of a skirt, gown, or state robe that lie on the floor and trail behind the wearer, either separate or attached.” (AAT) Deutsch: Schleppe", "de": "", "ex": []}, "dress::other footwear": {"l": "other footwear", "def": "", "de": "", "ex": []}, "body::strength": {"l": "strength", "def": "Kraft des Körpers oder seiner Teile. Manchmal mit wertender Komponente verbunden", "de": "", "ex": []}, "body::other immediate body attributes": {"l": "other immediate body attributes", "def": "Sammelkategorie für wahrnehmungs-unmittelbare Attribute, die noch nicht in der Taxonomie berücksichtigt sind", "de": "", "ex": []}, "body::palates": {"l": "palates", "def": "Gaumen", "de": "", "ex": []}, "dress::gender": {"l": "gender", "def": "Markierung eines Körpers oder Körperteils als spezifisch für eine genderspezifisch konstruierte Gruppe", "de": "", "ex": []}, "body::upper arms": {"l": "upper arms", "def": "Oberarme", "de": "", "ex": []}, "dress::armbands/bracelets": {"l": "armbands/bracelets", "def": "“Ornamental bands or circlets worn on the lower arm. Use \"armlets\" for similar articles worn on the upper arm.” (AAT) “Bands encircling the arm, sometimes worn for decoration, identification, or to signify mourning.” (AAT)", "de": "", "ex": []}, "body::eyebrows": {"l": "eyebrows", "def": "Augenbrauen", "de": "", "ex": []}, "body::hips": {"l": "hips", "def": "Hüften", "de": "", "ex": []}, "body::knuckles": {"l": "knuckles", "def": "Fingerknöchel", "de": "", "ex": Brustwarzen", "de": "", "ex": []}, "body::nostrils": {"l": "nostrils", "def": "Nasenlöcher", "de": "", "ex": []}, "dress::jackets": {"l": "jackets", "def": "“Short coats for the upper body made in various forms and lengths, but usually no lower than the waist or upper hip; worn indoors or for light warmth and protection from the weather.” (AAT)", "de": "", "ex": []}, "body::weight": {"l": "weight", "def": "Die physische Schwere eines Körperteils oder des Körpers als direkt wahrnehmbare Eigenschaft", "de": "", "ex": []}, "dress::footwear": {"l": "footwear", "def": "Kleidung, die die Füße bedeckt, insb. Schuhe. Hinweis: Den Wert footwear general vergeben wir, wenn es allgemein um Schuhe geht, ohne zu spezifizieren, welche Art. Achtung: Socken (stockings) und Strumpfhosen (hosiery) sortieren wir nicht hier ein, sondern unter accessories (accessories worn)", "de": "", "ex": []}, "body::eyelashes": {"l": "eyelashes", "def": "Wimpern", "de": "", "ex": []}, "dress::plaids": {"l": "plaids", "def": "“Main garments for the upper and lower body consisting of long, rectangular pieces of cloth, often but not always of tartan.” (AAT)", "de": "", "ex": []}, "dress::accessories worn": {"l": "accessories worn", "def": "“Items that do not form the primary articles of clothing, but are instead the smaller articles of dress, and that are worn on the body, as opposed to being carried. “ (AAT) Hinweis: Den Wert accessories worn general vergeben wir, wenn es allgemein um solche Accessories geht", "de": "", "ex": []}, "dress::beads/gems/jewels": {"l": "beads/gems/jewels", "def": "Valuable man-made objects often made of precious metals and gemstones. Any object of this sort used as an ornament or personal adornment set with stones or decorated with enamel and worn as an accessory of dress.” (AAT) Hinweis: hier sowohl geschliffen wie ungeschliffen", "de": "", "ex": []}, "body::harmony/regularity/symmetry": {"l": "harmony/regularity/symmetry", "def": "Ebenmäßigkeit, Symmetrie oder Harmonie des Körpers oder eines Körperteils, häufig der Gesichtszüge. Häufig mit wertender Komponente verbunden", "de": "", "ex": []}, "dress::way of wearing mediated": {"l": "way of wearing mediated", "def": "Ausdruckshaftes „Wie\" des Tragens, das eine Haltung/einen Charakterzug projiziert (stolz, würdevoll, nachlässig getragen). Abgrenzung: die rein physische Trageweise (offen, im Nacken) → way of wearing immediate", "de": "", "ex": []}, "body::bellies": {"l": "bellies", "def": "Bauch", "de": "", "ex": []}, "dress::dressing gowns": {"l": "dressing gowns", "def": "“Men's or women's loose, informal garments, often coat-like, worn when partly or fully undressed. Generally warm and often full-length; may be worn with a rope belt.”", "de": "", "ex": ["xyz"]}, "dress::alternative color descriptions": {"l": "alternative color descriptions", "def": "Farbbezogene, aber nicht auf Einzelfarben bezogene Beschreibungen wie “bunt” oder “farblos”", "de": "", "ex": []}, "body::shoulders": {"l": "shoulders", "def": "Schultern", "de": "", "ex": []}, "body::other parts of upper extremities": {"l": "other parts of upper extremities", "def": "Sammelkategorie für Teile der oberen Extremitäten, die noch nicht in der Taxonomie berücksichtigt sind", "de": "", "ex": []}, "dress::patches": {"l": "patches", "def": "Auf ein Kleidungsstück aufgebrachte Flicken, meist als Ausbesserung, als lokalisierbares Merkmal. Deutsch: Flicken", "de": "Flicken", "ex": []}, "dress::belts": {"l": "belts", "def": "“Flexible straps or bands generally encircling the waist or hips or passing over the shoulder and usually having some type of fastener, such as a buckle; worn for decoration, support, or to carry such items as weapons, tools, or money.” (AAT)", "de": "", "ex": []}, "body::fingers": {"l": "fingers", "def": "Finger", "de": "", "ex": []}, "body::hairstyles general": {"l": "hairstyles general", "def": "“Styles, forms, and arrangements of hair, usually hair on a human head and often enhanced by adding materials or substances to the hair. Hairstyles may have social and religious significance as well as aesthetic and artistic qualities.” (AAT) Hinweis: Wenn Accessoires erwähnt werden, die für Frisur benutzt erfassen wir das (zusätzlich) unter Accessoires. Den general-Tag vergeben wir bei einer allgemeinen Erwähnung der Frisur (z.B.: eine schöne Frisur, eine aufwendige Firsur)", "de": "", "ex": []}, "exterior": {"l": "exterior", "def": "", "de": "", "ex": []}, "body::laps": {"l": "laps", "def": "Schoß", "de": "", "ex": []}, "body::heels": {"l": "heels", "def": "Fersen", "de": "", "ex": []}, "body::facial expressions": {"l": "facial expressions", "def": "Mimik (auch Blick, Mundbewegung usw)", "de": "", "ex": []}, "dress::time": {"l": "time", "def": "Attributes situating a garment in time — whether by historical period, currency with contemporary fashion, or age of the garment. Examples: „old-fashioned“, „modern”, „Biedermeier dress“, „medieval costume”", "de": "", "ex": []}, "body::oral cavities": {"l": "oral cavities", "def": "Mundhöhle", "de": "", "ex": []}, "body::calves of leg": {"l": "calves of leg", "def": "Waden", "de": "", "ex": []}, "body::pupils": {"l": "pupils", "def": "Pupillen", "de": "", "ex": []}, "dress": {"l": "dress", "def": "", "de": "", "ex": []}, "dress::blouses/shirts/tops": {"l": "blouses/shirts/tops", "def": "tops: “General term for clothing worn on the upper part of the body, above the waist, excluding outerwear and underwear. [...]” (AAT) shirts: “Generally refers to various types of main garments for the upper body, made with or without sleeves and worn over or tucked in the waistband of a skirt, trousers, or the like. Usually having a collar, which may be detachable, often a front opening, and sometimes pockets. Specifically often refers to an article of male attire with long sleeves terminating in wristbands or cuffs. It originally referred to undergarments for the upper part of the body, made of linen, calico, flannel, silk, or other washable material; originally always worn next to the skin.” (AAT) blouses: “Main garments for the upper body, usually lightweight and loose-fitting, made with or without sleeves and worn over or tucked in the waistband of a skirt or trousers. Examples include loose garments worn by workmen, peasants and artists, as well as women's upper body garments of various designs.” (AAT) Es rug ein kurzes, schwarzes Röckchen und weißes Faltenhemd, [...]t", "de": "", "ex": []}, "body::moustaches": {"l": "moustaches", "def": "Schnurrbart", "de": "", "ex": []}, "dress::condition immediate": {"l": "condition immediate", "def": "“Condition is the overall state of an object, being, or environment, including physical characteristics such as appearance, pristineness, level of damage, completeness, working order, or quality.” (AAT) Hinweis: Wir fassen hierunter verschiedene Arten von Zustand eines Kleidungsstücks oder Teil eines Kleidungsstücks, dazu gehört etwa dessen Sauberkeit oder Abnutzungsgrad. Im Ggs. zu “condition mediated” wird diese hier in direkter Form angegeben, z.B. wird ein Kleidungsstück fleckig oder fadenscheinig genannt", "de": "", "ex": ["Ihm gegenüber saß eine bereits ältere Dame in einer seidenen, etwas fadenscheidigen Fransenmantille, [...]", "[...] eine der Damen, die eine – natürlich völlig durchschwitzte – seidene Bluse trug, [...]"]}, "dress::wreaths": {"l": "wreaths", "def": "“Costume accessories comprising circular bands of flowers, foilage, or ornamental work worn or bestowed as a mark of honor or victory or worn for purely decorative purposes.” (AAT) Deutsch: “Kränze”", "de": "", "ex": []}, "body::mouths": {"l": "mouths", "def": "Mund", "de": "", "ex": []}, "body::class/occupation": {"l": "class/occupation", "def": "Markierung eines Körpers oder Körperteils als spezifisch für eine als berufs- oder klassenspezifisch konstruierte Gruppe", "de": "", "ex": []}, "body::eyeballs": {"l": "eyeballs", "def": "Augäpfel", "de": "", "ex": []}, "body::age general": {"l": "age general", "def": "(Geschätzte) Alter in generischer Form", "de": "", "ex": []}, "dress::clothing for lower body": {"l": "clothing for lower body", "def": "Kleidung, die üblicherweise den unteren Körper bedeckt (z.B. Hosen, Röcke). Hinweis: Den Wert clothing for lower body general vergeben wir, wenn es allgemein um diese Kleidung geht, ohne die Art zu spezifizieren. Hinweis: Strumpfhosen (hosiery) sortieren wir nicht hier ein, sondern unter Accessories", "de": "", "ex": []}, "dress::furbelows": {"l": "furbelows", "def": "Pieces of self-fabric pleated and puckered, such as on a gown, petticoat or scarf, in the form of a flounce or swag.” (AAT) Deutsch: Rüschen/Volants", "de": "Rüschen, Volants", "ex": []}, "body::voice": {"l": "voice", "def": "Stimme", "de": "", "ex": []}, "body::toenails": {"l": "toenails", "def": "Zehennägel", "de": "", "ex": []}, "dress::robes": {"l": "robes", "def": "“Long, loose garments that tend to be of one piece and to open down the front. Examples include ordinary wear for men and women, dating from the Middle Ages forward in the West and common yet today in Asian and African countries; and similar garments often of elegant style worn for ceremonial or official occasions or as a symbol of office or profession. For women’s dresses, use \"gowns.\" For loose-fitting garments, often wraparound and worn to the bath or informally around the house use \"bathrobes.\"” (AAT)", "de": "", "ex": ["Sie trug eine einfache Robe von blauer Seide"]}, "body::lower extremities": {"l": "lower extremities", "def": "Region untere Extremitäten — übergeordnete Kategorie für Beine und Füße", "de": "", "ex": []}, "dress::hosiery": {"l": "hosiery", "def": "“Leg coverings, sometimes woven in one with panties, that extend to the ankle and usually cover the foot; generally knitted or woven, sheer or opaque, and of lightweight or heavy fabric. Distinguish from \"footwear\", which is primarily worn as coverings for the feet.” (AAT)", "de": "", "ex": []}, "body": {"l": "body", "def": "", "de": "", "ex": []}, "dress::wearing blankets": {"l": "wearing blankets", "def": "“Blankets that are worn loosely draped on the body.” (AAT)", "de": "", "ex": []}, "dress::style/type general": {"l": "style/type general", "def": "Zuordnung zu einem wiedererkennbaren Typ", "de": "", "ex": ["eine kecke Stupsnase"]}, "body::placement": {"l": "placement", "def": "Die Stelle, an der ein Körperteil oder ein Merkmal an einem anderen Körperteil lokalisiert ist", "de": "", "ex": ["ein Muttermal auf der linken Wange"]}, "dress::body-related general": {"l": "body-related general", "def": "Attributes describing the relationship between a garment and the body of the wearer, including fit and the effect on the body’s perceived appearance", "de": "", "ex": []}, "body::other group-related": {"l": "other group-related", "def": "Sammelkategorie für Markierungen eines Körpers oder Körperteils als spezifisch für eine andere Art von Gruppe als in den anderen Subkategorien spezifiziert", "de": "", "ex": []}, "dress::material general": {"l": "material general", "def": "Material generell ohne Erwähnung eines bestimmten Materials", "de": "", "ex": []}, "body::cosmetic products": {"l": "cosmetic products", "def": "", "de": "", "ex": []}, "body::palms of hand": {"l": "palms of hand", "def": "Handflächen", "de": "", "ex": []}, "dress::underpants": {"l": "underpants", "def": "“Garments worn next to the body and under main garments having leg openings or short or long legs.” (AAT)", "de": "", "ex": []}, "dress::class/occupation": {"l": "class/occupation", "def": "Markierung eines Körpers oder Körperteils als spezifisch für eine als berufs- oder klassenspezifisch konstruierte Gruppe", "de": "", "ex": []}, "body::attractiveness/beauty": {"l": "attractiveness/beauty", "def": "Generische Schönheits- oder Attraktivitätsurteile ohne spezifische Dimension. In aller Regel mit wertender Komponente verbunden", "de": "", "ex": ["ein Gesicht von eigenartiger Schönheit."]}, "dress::height": {"l": "height", "def": "Die Vertikalausdehnung der Gesamtfigur (Körpergröße)", "de": "", "ex": ["groß gewachsen, klein von Statur, hoch von Gestalt"]}, "body::heads": {"l": "heads", "def": "Region Kopf — übergeordnete Kategorie für alle Kopfteile", "de": "", "ex": []}, "body::warts": {"l": "warts", "def": "Warzen an einem Körperteil als sichtbares Merkmal", "de": "", "ex": ["eine Warze auf der Nase"]}, "dress::closure": {"l": "closure", "def": "“Devices that fasten or hold together separate parts of objects made from textiles.” (AAT) Hinweis: Definition bezieht sich dort auf “fasteners”, in CC wird closure als Oberbegriff für Knöpfe, Reißverschluss usw. verwendet, in AAT fasteners; ich betrachte closure und fasteners hier daher als synonym. Hinweis: ausgenommen buttons, diese selbst", "de": "", "ex": []}, "dress::suits": {"l": "suits", "def": "“Sets of two or more garments made to harmonize or match in color. Also, any costume designed to be worn for a special purpose or under particular conditions, such as a space suit or a snowsuit.” (AAT)", "de": "", "ex": []}, "dress::shape": {"l": "shape", "def": "Die Form oder charakteristische Konfiguration eines Körperteils, einschließlich seiner Konturen — als direkt sinnlicher Eindruck wiedergegeben", "de": "", "ex": ["Die eine hatte ein rundes Gesicht, [...]"]}, "dress::uniforms": {"l": "uniforms", "def": "Standardized garments worn to signal membership in an institution or organization. Examples: „school uniform“, „military uniform”, „servant’s livery\"", "de": "", "ex": []}, "body::uvulas": {"l": "uvulas", "def": "Gaumenzäpfchen", "de": "", "ex": []}, "body::lips": {"l": "lips", "def": "Lippen", "de": "", "ex": []}, "dress::garment linings": {"l": "garment linings", "def": "Interior components of garments stitched inside clothing to provide support and warmth, or simply as a finish.” (AAT) Deutsch: Futter", "de": "Futter", "ex": []}, "body::earlobes": {"l": "earlobes", "def": "Ohrläppchen", "de": "", "ex": []} e": "", "ex": ["Er hatte ein schmales, edles, etwas blasses Gesicht"]}, "dress::other immediate supplement attributes": {"l": "other immediate supplement attributes", "def": "Sammelkategorie für Informationen über rohe Attribute die bislang nicht in der Taxonomie berücksichtigt sind", "de": "", "ex": []}, "body::legs": {"l": "legs", "def": "Beine", "de": "", "ex": []}, "dress::rings": {"l": "rings", "def": "“Small circular bands worn on the finger; typically circlets of real or simulated precious metal, and frequently set with precious stones or imitations of these, intended for wearing upon the finger either as an ornament or as a token.” (AAT)", "de": "", "ex": []}, "body::quantity": {"l": "quantity", "def": "Die Menge eines Körperteils oder der Elemente, aus denen es besteht. Annotiert werden Aussagen über Menge, Anzahl oder Fülle", "de": "", "ex": ["reiches Haar, viele Sommersprossen, reichlich Muskeln, wenige Falten, vier Finger"]}, "body::humps": {"l": "humps", "def": "Buckel", "de": "", "ex": []}, "body::backs": {"l": "backs", "def": "Rücken", "de": "", "ex": []}, "dress::brightness": {"l": "brightness", "def": "Der Grad der Helligkeit oder Dunkelheit einer Körperoberfläche, unabhängig von der Farbe", "de": "", "ex": []}, "dress::colors general": {"l": "colors general", "def": "Farbtöne. Hinweis: Den Wert colors general vergeben wir, wenn wir erfahren, dass ein Farbton vorliegt aber nicht welcher", "de": "", "ex": []}, "body::armpits": {"l": "armpits", "def": "Achselhöhlen", "de": "", "ex": []}, "dress::fabric specific": {"l": "fabric specific", "def": "“[Specific] Material comprising long, thin filaments with a length at least 100 times their diameter; characterized by flexibility.” (AAT)", "de": "", "ex": ["Sie trug eine einfache Robe von blauer Seide", "[...] sie trug ein weißes Leinenkleid mit sehr viel Stickerei"]}, "dress::colors level 2": {"l": "colors level 2", "def": "Hierunter fassen wir alle hinsichtlich des Farbtons spezifischeren . At each end is a button or metal pin to attach the band to the cuff's buttonhole.” (AAT)", "de": "", "ex": []}, "dress::underdresses": {"l": "underdresses", "def": "“Dresses worn beneath another; use especially for those underdresses designed to be seen.” (AAT)", "de": "", "ex": []}, "dress::heels": {"l": "heels", "def": "Fersen", "de": "", "ex": []}, "dress::crinolines": {"l": "crinolines", "def": "“Petticoats originally made with a stiff, woven fabric of horsehair, linen, cotton, or wool. Later often used in conjunction with hoops of whalebone or steel.” (AAT)", "de": "", "ex": []}, "dress::tears": {"l": "tears", "def": "Risse in einem Kleidungsstück als lokalisierbares Merkmal. Deutsch: Risse", "de": "Risse", "ex": []}, "body::lower arms": {"l": "lower arms", "def": "Unterarme", "de": "", "ex": []}, "dress::vests": {"l": "vests", "def": "“Close-fitting main garments extending to the waist or just below. Sleeveless and usually collarless, and often having buttons or pockets. For close-fitting main garments extending below the waistline that are usually front-buttoning and may have sleeves, that are worn over a shirt and under a coat or jacket, use \"waistcoats.\"” (AAT)", "de": "", "ex": []}, "dress::brooches": {"l": "brooches", "def": "Broschen", "de": "", "ex": []}, "dress::civilian": {"l": "civilian", "def": "Zivilkleidung im Kontrast zur Uniform — explizit nicht-uniformierte Kleidung im Rollenkontext („in Zivil\")", "de": "", "ex": []}, "dress::stockings": {"l": "stockings", "def": "“Hosiery that covers the foot and extends to the knee or above; can be heavy or lightweight.” (AAT)", "de": "", "ex": []}, "body::shins": {"l": "shins", "def": "Schienbeine", "de": "", "ex": []}, "dress::cloaks/coats": {"l": "cloaks/coats", "def": "“Main garments usually fitted to the upper body, extending below the hip line, open at the front or side and generally having sleeves..” (AAT) auch Frack", "de": "", "ex": ["[...] er trug einen zimmetfarbigen Samtrock, und sogar auf einen kleinen dreieckigen Hut mit goldnen Borten [...]"]}, "body::teeth": {"l": "teeth", "def": "Zähne", "de": "", "ex": []}, "dress::weight": {"l": "weight", "def": "Die physische Schwere eines Körperteils oder des Körpers als direkt wahrnehmbare Eigenschaft", "de": "", "ex": []}, "body::beards": {"l": "beards", "def": "Bart", "de": "", "ex": []}, "dress::skirts": {"l": "skirts", "def": "“Main garments of varying length extending from the waist or hip and covering a part of the lower body. Also, the lower part of a dress, coat, or other garment.” (AAT)", "de": "", "ex": []}, "body::upper backs": {"l": "upper backs", "def": "Oberer Rücken", "de": "", "ex": []}, "dress::pullovers": {"l": "pullovers", "def": "“Main garments, usually made without a placket or similar opening, that must be drawn over the head to be put on.” (AAT) Hinweis: Bei uns auch für Strickjacken, Cardigans o.Ä", "de": "", "ex": []}, "dress::economic/value": {"l": "economic/value", "def": "Attributes referring to the monetary value or economic status signaled by clothing. Examples: „expensive“, „cheap”, „affordable“, „priceless”", "de": "", "ex": ["[…] und du wirst doch nicht die kostbaren Gewänder alle tragen […]"]}, "dress::undershirts": {"l": "undershirts", "def": "“Shirts, with or without sleeves, worn next to the body and under another shirt. [...]” (AAT)", "de": "", "ex": []}, "body::noses": {"l": "noses", "def": "Nase", "de": "", "ex": []}, "dress::mediated supplement attributes": {"l": "mediated supplement attributes", "def": "Attributes of clothing items that are not directly perceptible through sensory observation but are inferred or known through cultural, social, or contextual knowledge", "de": "", "ex": []}, "body::condition immediate": {"l": "condition immediate", "def": "“Condition is the overall state of an object, being, or environment, including physical characteristics such as appearance, pristineness, level of damage, completeness, working order, or quality.” (AAT) Hinweis: Wir hreiben", "de": "", "ex": []}, "dress::bags": {"l": "bags", "def": "“Small, medium, or large-sized soft or rigid receptacles, intended for carrying personal articles and usually used as ladies' costume accessories. A bag is closed in on all sides except at the top, where also it generally can be closed, and usually having handles or straps for carrying on the shoulder or in the hand. ” (AAT)", "de": "", "ex": []}, "body::ethnic/national/religious": {"l": "ethnic/national/religious", "def": "Markierung eines Körpers oder Körperteils als spezifisch für eine als ethnisch, religiös und oder national kosntruierte Gruppe", "de": "", "ex": ["[...] mit dem Teint einer Südländerin", "[...] denn König Waldemar Atterdag hatte dänisch blondes Haar [...]"]}, "dress::stitches": {"l": "stitches", "def": "“Refers to portions of thread left in fabric or another material by the in and out movement of a threaded needle through the thickness or surface of the material. It also refers to the loops of thread created on a needle in knitting or other needlework.” (AAT) Deutsch: Naht", "de": "", "ex": []}, "dress::thickness": {"l": "thickness", "def": "Die Dicke oder Dünne eines Körperteils", "de": "", "ex": ["Wirklich, er hatte es nicht bedacht, daß die Base selber einen dicken Hals hatte [...]"]}, "body::jaws": {"l": "jaws", "def": "Kiefer", "de": "", "ex": []}, "body::birthmarks/moles": {"l": "birthmarks/moles", "def": "Muttermale oder Leberflecken an einem Körperteil als sichtbares Merkmal", "de": "", "ex": ["ein Muttermal auf der linken Wange"]}, "dress::accessories": {"l": "accessories", "def": "“Items that do not form the primary articles of clothing, but are instead the smaller articles of dress, such as [...] gloves, [...] jewelry, etc.” (AAT) Hinweis: Im AAT werden auch Schuhe und Kopfbedeckungen zu den Accessories gezählt. Hier werden sie dagegen dem Clothing zugerechnet. Hinweis: Der Wert accessories general wird vergeben, wenn es allgemein um die Accessories geht", "de": : "clothing for upper and lower body", "def": "Kleidung, die üblicherweise sowohl (Teile des) oberen als auch des unteren Körpers bedeckt (z.B. Kleider, Mäntel). Hinweis: Den Wert clothing for upper and lower body general vergeben wir, wenn es allgemein um diese Kleidung geht, ohne die Art zu spezifizieren", "de": "", "ex": []}, "dress::armor": {"l": "armor", "def": "“Refers generally to that category of costume designed to be worn to protect the body in combat.” (angelehnt an AAT) Hinweis: Waffen und Rüstungen werden grundsätzlich als Grenzfall von Dress betrachtet. Zu behandeln ist dieser wie in den Guidelines zur Figurenbeschreibung: “Explizite Erwähnungen von Waffen betrachten wir dann als hinreichend für äußere Figurenbeschreibung, wenn sie als Teil des ‘Outfits’ einer Figur erscheinen. Typisch ist dann, dass die Figur die Waffen am Körper trägt und/oder dass auch andere Aspekte der Außenseite bzw. der Kleidung beschrieben werden. Wir betrachten solche Erwähnungen nicht als hinreichend für äußere Figurenbeschreibung, wenn der Fokus primär auf der Benutzung der Waffen (im Kampf) oder auf der Bewaffnung liegt.”", "de": "", "ex": []}, "body::movement": {"l": "movement", "def": "Habituelle Bewegungsweise einer Figur", "de": "", "ex": ["rasche, langsame, bedächtige, tänzerische, ungelenke, schwerfällige, geschmeidige Bewegungen. Abgrenzung zu einzelnen Handlungen: annotiert wird die als stabile Eigenschaft formulierte Bewegungscharakteristik (z.B. „seine raschen Bewegungen\"), nicht die Momentaufnahme einer konkreten Bewegung"]}, "body::gesture": {"l": "gesture", "def": "Habituelle Hand-, Arm- oder körperliche Ausdrucksbewegungen einer Figur", "de": "", "ex": ["„fuchtelte ständig mit den Händen\", „nervöse Gesten\", „immer in Bewegung\""]}, "dress::walking sticks": {"l": "walking sticks", "def": "“Sticks held in the hand and used for support in walking, especially as a fashionable and often ornamental accessory when taking a walk.” (AAT)", "de": "", "ex": []}, "dres   h+=field('Definition', n.def?esc(n.def):'<span class="ph">—</span>');
  var ex=(n.ex&&n.ex.length)?('<ul>'+n.ex.map(function(e){return '<li>'+esc(e).replace(/\ue000/g,'<b>').replace(/\ue001/g,'</b>')+'</li>';}).join('')+'</ul>'):'<span class="ph">— (aus Korpus ergänzen)</span>';
  h+=field('Beispiele', ex);
  d.innerHTML=h; d.classList.add('open');
}
renderNode(ROOT, treeEl, 0, false);
