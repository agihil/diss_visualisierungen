ertips": {"l": "fingertips", "def": "Fingerspitzen", "de": "", "ex": []}, "body::gums": {"l": "gums", "def": "Zahnfleisch", "de": "", "ex": []}, "body::warts": {"l": "warts", "def": "Warzen an einem Körperteil als sichtbares Merkmal", "de": "", "ex": ["eine Warze auf der Nase"]}, "body::other parts of lower extremities": {"l": "other parts of lower extremities", "def": "Sammelkategorie für Teile der unteren Extremitäten, die noch nicht in der Taxonomie berücksichtigt sind", "de": "", "ex": []}, "dress::bonnets": {"l": "bonnets", "def": "ergänzen", "de": "", "ex": []}, "body::ears": {"l": "ears", "def": "Ohren", "de": "", "ex": []}, "body::veins": {"l": "veins", "def": "Sichtbare Venen oder Adern an einem Körperteil", "de": "", "ex": ["blaue Adern auf dem Handrücken"]}, "body": {"l": "body", "def": "", "de": "", "ex": []}, "dress::other style/type": {"l": "other style/type", "def": "Type/style-related attributes not captured by place or time. (z. B. Bomberjacke, Maxikleid)", "de": "", "ex": []}, "dress::weight": {"l": "weight", "def": "Die physische Schwere eines Körperteils oder des Körpers als direkt wahrnehmbare Eigenschaft", "de": "", "ex": []}, "body::weight": {"l": "weight", "def": "Die physische Schwere eines Körperteils oder des Körpers als direkt wahrnehmbare Eigenschaft", "de": "", "ex": []}, "dress::other headwear": {"l": "other headwear", "def": "Covering for the head that does not match any of the other terms", "de": "", "ex": []}, "body::ethnic/national/religious": {"l": "ethnic/national/religious", "def": "Markierung eines Körpers oder Körperteils als spezifisch für eine als ethnisch, religiös und oder national kosntruierte Gruppe", "de": "", "ex": ["[...] mit dem Teint einer Südländerin", "[...] denn König Waldemar Atterdag hatte dänisch blondes Haar [...]"]}, "dress::weapons": {"l": "weapons", "def": "“Refers generally to that category of costume designed to or carried to protect the body in combat.\"” (angelehnt an AAT) Hinweis: Waffen und Rüstungen werden grundsätzlich als Grenzfall von Dress betrachtet. Zu behandeln ist dieser wie in den Guidelines zur Figurenbeschreibung: “Explizite Erwähnungen von Waffen betrachten wir dann als hinreichend für äußere Figurenbeschreibung, wenn sie als Teil des ‘Outfits’ einer Figur erscheinen. Typisch ist dann, dass die Figur die Waffen am Körper trägt und/oder dass auch andere Aspekte der Außenseite bzw. der Kleidung beschrieben werden. Wir betrachten solche Erwähnungen nicht als hinreichend für äußere Figurenbeschreibung, wenn der Fokus primär auf der Benutzung der Waffen (im Kampf) oder auf der Bewaffnung liegt.”", "de": "", "ex": ["Er trug die Kleidung eines Westläufers, hatte eine Flinte auf dem Rücken hängen und in dem Gürtel einen Revolver, ein Bowiemesser und – – – was noch mehr stecken?"]}, "dress::fabric general": {"l": "fabric general", "def": "“Material comprising long, thin filaments with a length at least 100 times their diameter; characterized by flexibility.” (AAT) Hinweis: Hier allgemeine Erwähnung eines Stoffes ohne Erwähnung eines bestimmten Stoffes", "de": "", "ex": ["teure Stoffe", "einfaches Tuch"]}, "dress::other group-related": {"l": "other group-related", "def": "Sammelkategorie für Markierungen eines Körpers oder Körperteils als spezifisch für eine andere Art von Gruppe als in den anderen Subkategorien spezifiziert", "de": "", "ex": []}, "body::hips": {"l": "hips", "def": "Hüften", "de": "", "ex": []}, "dress::muffs": {"l": "muffs", "def": "“Tubular coverings for the hands, often open at both ends, worn for warmth.” (AAT)", "de": "", "ex": []}, "dress::width": {"l": "width", "def": "Die Breite eines Körperteils in der Querrichtung", "de": "", "ex": ["breite Schultern, schmale Hüften, schmaler Mund"]}, "body::toes": {"l": "toes", "def": "Zehen", "de": "", "ex": []}, "body::body parts": {"l": "body parts", "def": "", "de": "", "ex": []}, "dress::pockets": {"l": "pockets", "def": "Flat pouchlike components stitched into or onto a garment, accessible through a finished opening typically convenient to the hand.” (AAT) Deutsch: (Innen-)Taschen", "de": "", "ex": []}, "dress::other clothing for the lower body": {"l": "other clothing for the lower body", "def": "", "de": "", "ex": []}, "dress::shorts/trousers": {"l": "shorts/trousers", "def": "“Exposed bifurcated garments which extend from waist or hips to the ankle or sometimes to the knee or just below.” (AAT)", "de": "", "ex": []}, "modification": {"l": "modification", "def": "", "de": "", "ex": []}, "body::colors level 1": {"l": "colors level 1", "def": "Mit colors level 1 annotieren wir basale, einfache, also nicht zusammengesetzte Farbtöne: blau, rot, gelb, grün, orange, pink, lila, türkis, schwarz, weiß, grau, braun sowie deren Synonyme und analoge Ausdrücke. Hinweis: Sowohl Farbtöne des Levels 1 als auch des Levels 2 können zusätzlich hinsichtlich des color value oder der anderen farbbezogenen Attribute näher spezifiziert werden", "de": "", "ex": ["schwarzes Haar", "blonde Haare"]}, "dress::trimming": {"l": "trimming", "def": "“Collectively used for decorative or additional material serving to finish, decorate, or complete.” (AAT) Hinweis: Direkte Veränderung am Kleidungsstück im Gegensatz zu Objekthaftigkeit Deutsch: Ornamente, Verzierung, Besatz", "de": "", "ex": []}, "body::eyelashes": {"l": "eyelashes", "def": "Wimpern", "de": "", "ex": []}, "body::condition mediated": {"l": "condition mediated", "def": "Gesamtzustand eines Körpers oder Körperteils. Häufig mit wertender Komponente verbunden. (Für Abgrenzung zu condition immediate s. 3.4.3.1)", "de": "", "ex": []}, "dress::lacings": {"l": "lacings", "def": "Schnürung", "de": "", "ex": []}, "dress::fitting mediated": {"l": "fitting mediated", "def": "Attributes describing how well a garment fits the wearer’s body. Examples: „too tight“, „too loose”, „well-fitting“, „tailor-made”. (kann evaluativ sein)", "de": "", "ex": ["eng anliegend"]}, "dress::trains": {"l": "trains", "def": "“Extend dungsstück (durchgescheuert, gerissen oder absichtlich geschnitten) als lokalisierbares Merkmal. Deutsch: Löcher", "de": "Löcher", "ex": []}, "dress::hosiery": {"l": "hosiery", "def": "“Leg coverings, sometimes woven in one with panties, that extend to the ankle and usually cover the foot; generally knitted or woven, sheer or opaque, and of lightweight or heavy fabric. Distinguish from \"footwear\", which is primarily worn as coverings for the feet.” (AAT)", "de": "", "ex": []}, "body::length": {"l": "length", "def": "Die Länge eines Körperteils", "de": "", "ex": ["lange Arme, kurze Finger, langer Hals, lange Haare"]}, "dress::other parts of supplements": {"l": "other parts of supplements", "def": "", "de": "", "ex": []}, "body::scars": {"l": "scars", "def": "Narben an einem Körperteil als dauerhaft sichtbares Merkmal", "de": "", "ex": ["eine Narbe auf der Wange, narbige Hände"]}, "dress::condition immediate": {"l": "condition immediate", "def": "“Condition is the overall state of an object, being, or environment, including physical characteristics such as appearance, pristineness, level of damage, completeness, working order, or quality.” (AAT) Hinweis: Wir fassen hierunter verschiedene Arten von Zustand eines Kleidungsstücks oder Teil eines Kleidungsstücks, dazu gehört etwa dessen Sauberkeit oder Abnutzungsgrad. Im Ggs. zu “condition mediated” wird diese hier in direkter Form angegeben, z.B. wird ein Kleidungsstück fleckig oder fadenscheinig genannt", "de": "", "ex": ["Ihm gegenüber saß eine bereits ältere Dame in einer seidenen, etwas fadenscheidigen Fransenmantille, [...]", "[...] eine der Damen, die eine – natürlich völlig durchschwitzte – seidene Bluse trug, [...]"]}, "dress::garment linings": {"l": "garment linings", "def": "Interior components of garments stitched inside clothing to provide support and warmth, or simply as a finish.” (AAT) Deutsch: Futter", "de": "Futter", "ex": []}, "body::temperature": {"l": "temperature", "def": "Die Körpertemperatur oder Körperteiltemperatur. Hinweis: gemeint ist hier nur die explizite, wörtliche Temperatur, keine metaphorische Wärme oder Kälte (warmer Blick)", "de": "", "ex": ["warme Hände"]}, "body::chins": {"l": "chins", "def": "Kinn", "de": "", "ex": []}, "body::lower arms": {"l": "lower arms", "def": "Unterarme", "de": "", "ex": []}, "dress::underskirts": {"l": "underskirts", "def": "“Skirts worn beneath another; use especially for those underskirts designed to be seen.” (AAT)", "de": "", "ex": []}, "body::breasts": {"l": "breasts", "def": "Brüste", "de": "", "ex": []}, "dress::pantofles/slippers": {"l": "pantofles/slippers", "def": "“Mulelike footwear with a vamp and no quarters worn from the 15th into the 17th century and having two different functions, as slippers intended for indoor use and as overshoes with a thick sole, often of cork, intended for outdoor use. For women's shoes or overshoes with a mulelike upper and a high platform sole, use \"chopines.\"” (AAT)", "de": "", "ex": []}, "body::palates": {"l": "palates", "def": "Gaumen", "de": "", "ex": []}, "body::back of head": {"l": "back of head", "def": "Hinterkopf", "de": "", "ex": []}, "dress::walking sticks": {"l": "walking sticks", "def": "“Sticks held in the hand and used for support in walking, especially as a fashionable and often ornamental accessory when taking a walk.” (AAT)", "de": "", "ex": []}, "body::nostrils": {"l": "nostrils", "def": "Nasenlöcher", "de": "", "ex": []}, "dress::ponchos": {"l": "ponchos", "def": "“Blanketlike garments, usually square or oblong with a slit in the center for the head, originating in South America. Also, similar garments used elsewhere, including those made of water-repellent fabric and usually having a hood, and when not worn, used as a blanket or tarpaulin.” (AAT)", "de": "", "ex": []}, "dress::other clothing for upper and lower body": {"l": "other clothing for upper and lower body", "def": "", "de": "", "ex": []}, "dress::dressing gowns": {"l": "dressing gowns", "def": "“Men's or women's loose, informal garments, often coat-like, worn when partly or fully undressed. Generally warm and often full-length; may be worn with a rope belt.”", "de": "", "ex": ["xyz"]}, "body::backs": {"l": "backs", "def": "Rücken", "de": "", "ex": []}, "dress::badges": {"l": "badges", "def": "“Objects bearing special or distinctive marks and worn for decoration or to signify affiliation. Originally, badges were heraldic symbols worn as identifying marks by a knight and his retainers, e.g., a badge of arms. In later use, the term refers to any distinctive device, emblem, or mark worn to indicate a person's affiliation, rank, office, name, or membership in an organization or support for a cause, particularly objects that comprise small pieces of metal, card, plastic, etc., that bear a distinguishing design or words.” (AAT)", "de": "", "ex": []}, "body::shoulderblades": {"l": "shoulderblades", "def": "Schulterblätter", "de": "", "ex": []}, "dress::hats": {"l": "hats", "def": "“Shaped coverings for the head having a brim and crown, or one of the two.” (AAT)", "de": "", "ex": ["[...] er trug einen zimmetfarbigen Samtrock, und sogar auf einen kleinen dreieckigen Hut mit goldnen Borten [...]"]}, "dress::alternative color descriptions": {"l": "alternative color descriptions", "def": "Farbbezogene, aber nicht auf Einzelfarben bezogene Beschreibungen wie “bunt” oder “farblos”", "de": "", "ex": []}, "dress::optical properties general": {"l": "optical properties general", "def": "Eigenschaften, die die Interaktion eines Körperteils mit Licht beschreiben", "de": "", "ex": []}, "dress::dynamic aspects": {"l": "dynamic aspects", "def": "Art und Weise in der sich das Kleidungsstück oder Kleidungsteilstück bewegt", "de": "", "ex": ["z.B. wehend"]}, "body::feet": {"l": "feet", "def": "Füße", "de": "", "ex": []}, "body::uvulas": {"l": "uvulas", "def": "Gaumenzäpfchen", "de": "", "ex": []}, "body::gait": {"l": "gait", "def": "Charakteristische Art der Fortbewegung — wie eine Figur typischerweise geht", "de": "", "ex": ["schleppender Gang, federnder Schritt, wiegender Gang, hinkend. Abgrenzung: nur als habituelles Merkmal annotieren, nicht das einmalige Gehen in einer Erzählsituation"]}, "body::insteps": {"l": "insteps", "def": "Fußrücken", "de": "", "ex": []}, "dress::necklaces": {"l": "necklaces", "def": "“Ornaments worn around the neck, usually in the form of chains or strands of beads, pearls, stones, or decorative or precious materials, and often including a suspended ornamental pendant. Use \"chokers\" for short, narrow necklaces worn close to the throat. Use \"dog collars (necklaces)\" for wide ornamental bands worn tightly around the neck.” (AAT)", "de": "", "ex": []}, "dress::skirts": {"l": "skirts", "def": "“Main garments of varying length extending from the waist or hip and covering a part of the lower body. Also, the lower part of a dress, coat, or other garment.” (AAT)", "de": "", "ex": []}, "body::type": {"l": "type", "def": "Zuordnung zu einem wiedererkennbaren Typ", "de": "", "ex": ["eine kecke Stupsnase"]}, "dress::class/occupation": {"l": "class/occupation", "def": "Markierung eines Körpers oder Körperteils als spezifisch für eine als berufs- oder klassenspezifisch konstruierte Gruppe", "de": "", "ex": []}, "body::hair": {"l": "hair", "def": "Kopfhaar", "de": "", "ex": []}, "dress::accessories worn": {"l": "accessories worn", "def": "“Items that do not form the primary articles of clothing, but are instead the smaller articles of dress, and that are worn on the body, as opposed to being carried. “ (AAT) Hinweis: Den Wert accessories worn general vergeben wir, wenn es allgemein um solche Accessories geht", "de": "", "ex": []}, "dress::wreaths": {"l": "wreaths", "def": "“Costume accessories comprising circular bands of flowers, foilage, or ornamental work worn or bestowed as a mark of honor or victory or worn for purely decorative purposes.” (AAT) Deutsch: “Kränze”", "de": "", "ex": []}, "dress::blouses/shirts/tops": {"l": "blouses/shirts/tops", "def": "tops: “General term for clothing worn on the upper part of the body, above the waist, excluding outerwear and underwear. [...]” (AAT) shirts: “Generally refers to various types of main garments for the upper body, made with or without sleeves and worn over or tucked in the waistband of a skirt, trousers, or the like. Usually having a collar, which may be detachable, often a front opening, and sometimes pockets. Specifically often refers to an article of male attire with long sleeves terminating in wristbands or cuffs. It originally referred to undergarments for the upper part of the body, made of linen, calico, flannel, silk, or other washable material; originally always worn next to the skin.” (AAT) blouses: “Main garments for the upper body, usually lightweight and loose-fitting, made with or without sleeves and worn over or tucked in the waistband of a skirt or trousers. Examples include loose garments worn by workmen, peasants and artists, as well as women's upper body garments of various designs.” (AAT) Es rug ein kurzes, schwarzes Röckchen und weißes Faltenhemd, [...]t", "de": "", "ex": []}, "dress::armbands/bracelets": {"l": "armbands/bracelets", "def": "“Ornamental bands or circlets worn on the lower arm. Use \"armlets\" for similar articles worn on the upper arm.” (AAT) “Bands encircling the arm, sometimes worn for decoration, identification, or to signify mourning.” (AAT)", "de": "", "ex": []}, "dress::belts": {"l": "belts", "def": "“Flexible straps or bands generally encircling the waist or hips or passing over the shoulder and usually having some type of fastener, such as a buckle; worn for decoration, support, or to carry such items as weapons, tools, or money.” (AAT)", "de": "", "ex": []}, "body::calves of leg": {"l": "calves of leg", "def": "Waden", "de": "", "ex": []}, "body::heads": {"l": "heads", "def": "Region Kopf — übergeordnete Kategorie für alle Kopfteile", "de": "", "ex": []}, "dress::way of wearing mediated": {"l": "way of wearing mediated", "def": "Ausdruckshaftes „Wie\" des Tragens, das eine Haltung/einen Charakterzug projiziert (stolz, würdevoll, nachlässig getragen). Abgrenzung: die rein physische Trageweise (offen, im Nacken) → way of wearing immediate", "de": "", "ex": []}, "body::healthiness": {"l": "healthiness", "def": "Gesundheit/Krankheit eines Körpers oder seiner Teile", "de": "", "ex": []}, "body::other body components": {"l": "other body components", "def": "", "de": "", "ex": []}, "dress::body effect": {"l": "body effect", "def": "Attributes describing the effect a garment has on the perceived appearance or shape of the body. Examples: „slimming“, „figure-hugging”", "de": "", "ex": []}, "body::heels": {"l": "heels", "def": "Fersen", "de": "", "ex": []}, "dress::place": {"l": "place", "def": "Attributes indicating the geographical origin or regional association of a garment. Examples: „Viennese fashion“, „imported from Paris”, „Italian style\"", "de": "", "ex": []}, "dress::turbans": {"l": "turbans", "def": "“Headdresses consisting of a tight-fitting cap around which is wound a long cloth, originating in eastern Mediterranean and southern Asian countries. Also, headgear of similar appearance which may be constructed differently.” (AAT)", "de": "", "ex": []}, "body::laps": {"l": "laps", "def": "Schoß", "de": "", "ex": []}, "body::mouths": {"l": "mouths", "def": "Mund", "de": "", "ex": []}, "body::skin color": {"l": "skin color", "def": "“Hautfarbe” als soziales Konstrukt betrachten wir als zwar (noch) sinnlich wahrnehmbar aber als distinkt von rein sinnlichen Farb-Ausdrücken. Anders als solche Farb-Ausdrücke ist Hautfarbe kulturell überformt und bezieht sich auf mehr als einen reinen Farb-Ausdruck", "de": "", "ex": []}, "dress::undershirts": {"l": "undershirts", "def": "“Shirts, with or without sleeves, worn next to the body and under another shirt. [...]” (AAT)", "de": "", "ex": []}, "dress::cloaks/coats": {"l": "cloaks/coats", "def": "“Main garments usually fitted to the upper body, extending below the hip line, open at the front or side and generally having sleeves..” (AAT) auch Frack", "de": "", "ex": ["[...] er trug einen zimmetfarbigen Samtrock, und sogar auf einen kleinen dreieckigen Hut mit goldnen Borten [...]"]}, "body::eyes": {"l": "eyes", "def": "Augen", "de": "", "ex": []}, "body::adam's apples": {"l": "adam's apples", "def": "Adamsapfel", "de": "", "ex": []}, "dress::time": {"l": "time", "def": "Attributes situating a garment in time — whether by historical period, currency with contemporary fashion, or age of the garment. Examples: „old-fashioned“, „modern”, „Biedermeier dress“, „medieval costume”", "de": "", "ex": []}, "body::faces": {"l": "faces", "def": "Gesicht", "de": "", "ex": []}, "dress::diadems": {"l": "diadems", "def": "“Ornamental frontals or headbands, often of metal or cloth, may be adorned with jewels; often worn as a symbol of honor or royalty.” (AAT)", "de": "", "ex": []}, "body::calluses": {"l": "calluses", "def": "Schwielen oder Hornhaut an einem Körperteil als sichtbares oder tastbares Merkmal", "de": "", "ex": ["schwielige Hände"]}, "dress::helmets": {"l": "helmets", "def": "“Any of various forms of protective coverings for the head, usually made of a hard material, including the outside steel layer of helmets that consist of inner and outer parts.” (AAT)", "de": "", "ex": []}, "body::color and color-related": {"l": "color and color-related", "def": "Hinweis: color and color-related general wird annotiert, wenn sich die Beschreibung auf die Farbe allgemein bezieht ohne direkte Informationen wie in den Subhierarchien spezifiziert", "de": "", "ex": ["Ihre Haut hatte die Farbe eines warmen Sommertags"]}, "dress::simplicity": {"l": "simplicity", "def": "Attributes indicating the degree of plainness versus ornamentation of a garment. Examples: „plain“, „simple”, „unadorned“, „ornate”, „lavish\"", "de": "", "ex": []}, "body::lips": {"l": "lips", "def": "Lippen", "de": "", "ex": []}, "dress::brooches": {"l": "brooches", "def": "Broschen", "de": "", "ex": []}, "body::other group-related": {"l": "other group-related", "def": "Sammelkategorie für Markierungen eines Körpers oder Körperteils als spezifisch für eine andere Art von Gruppe als in den anderen Subkategorien spezifiziert", "de": "", "ex": []}, "dress::fronts (garment sections)": {"l": "fronts (garment sections)", "def": "Parts of a garment that cover the front half of the girth of the body, often comprising a panel or series of panels of material.” (AAT) Deutsch: Vorderseiten", "de": "", "ex": []}, "dress::headwear": {"l": "headwear", "def": "“Any covering for the head.” (AAT) Hinweis: Den Wert “headwear general” vergeben wir, wenn es allgemein um die Kopfbedeckung geht, ohne dass spezifiziert wird, welche Art von Kopfbedeckung (Mütze, Hut o.Ä.) es ist", "de": "", "ex": ["05, 10"]}, "dress::crinolines": {"l": "crinolines", "def": "“Petticoats originally made with a stiff, woven fabric of horsehair, linen, cotton, or wool. Later often used in conjunction with hoops of whalebone or steel.” (AAT)", "de": "", "ex": []}, "dress::rings": {"l": "rings", "def": "“Small circular bands worn on the finger; typically circlets of real or simulated precious metal, and frequently set with precious stones or imitations of these, intended for wearing upon the finger either as an ornament or as a token.” (AAT)", "de": "", "ex": []}, "dress::size": {"l": "size", "def": "Die Größe eines Körpers oder Körperteils", "de": "", "ex": ["Der Herr hat eine so außergewöhnlich große Hand!"]}, "body::gesture": {"l": "gesture", "def": "Habituelle Hand-, Arm- oder körperliche Ausdrucksbewegungen einer Figur", "de": "", "ex": ["„fuchtelte ständig mit den Händen\", „nervöse Gesten\", „immer in Bewegung\""]}, "body::dimples": {"l": "dimples", "def": "Grübchen an einem Körperteil als sichtbares Merkmal", "de": "", "ex": ["Grübchen in den Wangen"]}, "body::color-related properties": {"l": "color-related properties", "def": "Typische farbbezogene Eigenschaften wie schwach, stark, tief, warm, kalt, blass usw. (außer color value, da dieser als eigene Kategorie erfasst wird). Hinweis: Wird nur zusammen mit Farbe annotiert", "de": "", "ex": []}, "body::height": {"l": "height", "def": "Die Vertikalausdehnung der Gesamtfigur (Körpergröße)", "de": "", "ex": ["groß gewachsen, klein von Statur, hoch von Gestalt"]}, "body::humps": {"l": "humps", "def": "Buckel", "de": "", "ex": []}, "body::age specific": {"l": "age specific", "def": "Spezifische Angabe des Alters", "de": "", "ex": []}, "dress::fitting immediate": {"l": "fitting immediate", "def": "", "de": "", "ex": []}, "dress::occasion/wear context": {"l": "occasion/wear context", "def": "Attributes indicating the typical occasion, situation, or context for which a garment is worn or reserved. Includes time-of-day associations, domestic contexts, ceremonial use, and special occasions. Examples: „Abendkleid“, „Schlafrock”, „Sonntagskleid“, „Zeremonialgewand”", "de": "", "ex": ["Er trug eine leichte Reisemütze. (Annotation: caps + occasion/wear context)"]}, "body::upper backs": {"l": "upper backs", "def": "Oberer Rücken", "de": "", "ex": []}, "dress::gender": {"l": "gender", "def": "Markierung eines Körpers oder Körperteils als spezifisch für eine genderspezifisch konstruierte Gruppe", "de": "", "ex": []}, "dress::wearing blankets": {"l": "wearing blankets", "def": "“Blankets that are worn loosely draped on the body.” (AAT)", "de": "", "ex": []}, "body::width": {"l": "width", "def": "Die Breite eines Körperteils in der Querrichtung", "de": "", "ex": ["breite Schultern, schmale Hüften, schmaler Mund"]}, "dress::parts of supplements": {"l": "parts of supplements", "def": "Parts or components of costumes.", "de": "", "ex": []}, "dress::color value": {"l": "color value", "def": "Der Grad der Helligkeit oder Dunkelheit eines Farbtons. Wird nur zusammen mit Farbe annotiert. Hinweis: Wenn es um Helligkeit/Dunkelheit eines Körperteils jenseits der Farbe geht, wird brightness annotiert", "de": "", "ex": ["dunkelbraunes Haar"]}, "dress::stockings": {"l": "stockings", "def": "“Hosiery that covers the foot and extends to the knee or above; can be heavy or lightweight.” (AAT)", "de": "", "ex": []}, "dress::dresses": {"l": "dresses", "def": "“Main garments for women, children, or infants consisting of a bodice and skirt made in one or more pieces.” (AAT)", "de": "", "ex": ["Sie trug ein rotes Kleid von feinem Wollstoff"]}, "body::colors level 2": {"l": "colors level 2", "def": "Hierunter fassen wir alle hinsichtlich des Farbtons spezifischeren Ausdrücke als die in color level 1. Häufig, aber nicht immer sind das zusammengesetzte Ausdrücke, z.B. goldblond, pechschwarz, aschgrau, kupferrot, elfenbeinfarben", "de": "", "ex": ["Sie hatte pechschwarzes Haar", "[...] die Farbe des Haares war aschblond [...]"]}, "body::alternative color descriptions": {"l": "alternative color descriptions", "def": "Farbbezogene, aber nicht auf Einzelfarben bezogene Beschreibungen wie “bunt” oder “farblos”", "de": "", "ex": []}, "body::lower extremities": {"l": "lower extremities", "def": "Region untere Extremitäten — übergeordnete Kategorie für Beine und Füße", "de": "", "ex": []}, "body::fingernails": {"l": "fingernails", "def": "Fingernägel", "de": "", "ex": []}, "body::parts of body parts": {"l": "parts of body parts", "def": "", "de": "", "ex": []}, "dress::ethnic/national/religious": {"l": "ethnic/national/religious", "def": "Markierung eines Körpers oder Körperteils als spezifisch für eine als ethnisch, religiös und oder national kosntruierte Gruppe", "de": "", "ex": ["[...] mit dem Teint einer Südländerin", "[...] denn König Waldemar Atterdag hatte dänisch blondes Haar [...]"]}, "dress::underdresses": {"l": "underdresses", "def": "“Dresses worn beneath another; use especially for those underdresses designed to be seen.” (AAT)", "de": "", "ex": []}, "dress::other footwear": {"l": "other footwear", "def": "", "de": "", "ex": []}, "dress::height": {"l": "height", "def": "Die Vertikalausdehnung der Gesamtfigur (Körpergröße)", "de": "", "ex": ["groß gewachsen, klein von Statur, hoch von Gestalt"]}, "body::pupils": {"l": "pupils", "def": "Pupillen", "de": "", "ex": []}, "body::size": {"l": "size", "def": "Die Größe eines Körpers oder Körperteils", "de": "", "ex": ["Der Herr hat eine so außergewöhnlich große Hand!"]}, "dress::clothing for upper and lower body": {"l": "clothing for upper and lower body", "def": "Kleidung, die üblicherweise sowohl (Teile des) oberen als auch des unteren Körpers bedeckt (z.B. Kleider, Mäntel). Hinweis: Den Wert clothing for upper and lower body general vergeben wir, wenn es allgemein um diese Kleidung geht, ohne die Art zu spezifizieren", "de": "", "ex": []}, "body::birthmarks/moles": {"l": "birthmarks/moles", "def": "Muttermale oder Leberflecken an einem Körperteil als sichtbares Merkmal", "de": "", "ex": ["ein Muttermal auf der linken Wange"]}, "body::other parts of heads": {"l": "other parts of heads", "def": "Sammelkategorie für Kopfteile, die noch nicht in der Taxonomie berücksichtigt sind", "de": "", "ex": []}, "dress::hems": {"l": "hems", "def": "Finished edge of a cloth article, such as a skirt, sleeve, or curtain fashioned by rolling up or folding back an edge and stitching it down.” (AAT) Deutsch: Säume, Ränder", "de": "", "ex": []}, "body::moustaches": {"l": "moustaches", "def": "Schnurrbart", "de": "", "ex": []}, "dress::vests": {"l": "vests", "def": "“Close-fitting main garments extending to the waist or just below. Sleeveless and usually collarless, and often having buttons or pockets. For close-fitting main garments extending below the waistline that are usually front-buttoning and may have sleeves, that are worn over a shirt and under a coat or jacket, use \"waistcoats.\"” (AAT)", "de": "", "ex": []}, "body::mediated body attributes": {"l": "mediated body attributes", "def": "Sinnlich wahrnehmbare Attribute des Körpers, die in kognitiv vermittelter (z.B. eingeordneter, bewerteter) Form wiedergegeben werden", "de": "", "ex": []}, "dress::coattails": {"l": "coattails", "def": "“Rear flaps of a man's coat, such as on a tail coat, cutaway, or the like.” (AAT) Deutsch: Rockschöße", "de": "Rockschöße", "ex": []}, "dress::shape": {"l": "shape", "def": "Die Form oder charakteristische Konfiguration eines Körperteils, einschließlich seiner Konturen — als direkt sinnlicher Eindruck wiedergegeben", "de": "", "ex": ["Die eine hatte ein rundes Gesicht, [...]"]}, "dress::fabric specific": {"l": "fabric specific", "def": "“[Specific] Material comprising long, thin filaments with a length at least 100 times their diameter; characterized by flexibility.” (AAT)", "de": "", "ex": ["Sie trug eine einfache Robe von blauer Seide", "[...] sie trug ein weißes Leinenkleid mit sehr viel Stickerei"]}, "body::temples": {"l": "temples", "def": "Schläfen", "de": "", "ex": []}, "body::gender": {"l": "gender", "def": "Markierung eines Körpers oder Körperteils als spezifisch für eine genderspezifisch konstruierte Gruppe", "de": "", "ex": []}, "body::lower legs": {"l": "lower legs", "def": "Unterschenkel", "de": "", "ex": []}, "dress::buckles": {"l": "buckles", "def": "“Devices used for fastening consisting of a usually open rectangular or rounded frame and a tongue or catch attached to one side or a vertical bar attached across the center. Sometimes used alone as an ornament.” (AAT) Deutsch: Schnallen", "de": "Schnalle", "ex": []}, "dress::pattern": {"l": "pattern", "def": "“Each ornamental design, either on a flat surface or in relief, composed of repeated or combined motifs.” (CC) Hinweis: Kann mit Farbe kombiniert sein. (rot und weiß gestreift). Dann sind Farbe und pattern zu annotieren", "de": "", "ex": ["“Die kurzen Beine waren in großkarrierte Hosen gesteckt [...]”", "Nie hatte er den geblümten, seidenen Schlafrock so oft getragen, wie jetzt"]}, "body::immediate body attributes": {"l": "immediate body attributes", "def": "Attribute des Körpers und seiner Teile, die durch direkte sinnliche Wahrnehmung erfassbar sind — wie Farbe, Form, Textur oder optische Eigenschaften", "de": "", "ex": []}, "body::impressiveness/presence": {"l": "impressiveness/presence", "def": "Impressivität, Stattlichkeit eines Körpers oder Körperteils", "de": "", "ex": ["[...] einen um das Kinn gehenden stattlichen Bart [...]"]}, "dress::pullovers": {"l": "pullovers", "def": "“Main garments, usually made without a placket or similar opening, that must be drawn over the head to be put on.” (AAT) Hinweis: Bei uns auch für Strickjacken, Cardigans o.Ä", "de": "", "ex": []}, "dress::buttons": {"l": "buttons", "def": "“Disks, balls, or devices of other shape having holes or a shank by which they are sewn or secured to an article and that are used as fasteners by passing through a buttonhole or loop or a trimming.” (AAT) Deutsch: Knöpfe", "de": "", "ex": []}, "body::other parts of body parts": {"l": "other parts of body parts", "def": "Sammelkategorie für konkrete, sinnlich wahrnehmbare Merkmale an Körperteilen, die noch nicht in der Taxonomie berücksichtigt sind", "de": "", "ex": []}, "body::optical properties general": {"l": "optical properties general", "def": "Eigenschaften, die die Interaktion eines Körperteils mit Licht beschreiben", "de": "", "ex": []}, "body::age general": {"l": "age general", "def": "(Geschätzte) Alter in generischer Form", "de": "", "ex": []}, "body::throats": {"l": "throats", "def": "Kehle, Vorderseite des Halses", "de": "", "ex": []}, "dress::other function-related": {"l": "other function-related", "def": "Function-related attributes not captured by the defined subcategories", "de": "", "ex": []}, "body::injuries/wounds": {"l": "injuries/wounds", "def": "Wunden, Verletzungen oder Verletzungsfolgen an einem Körperteil, die als sichtbares Merkmal beschrieben werden", "de": "", "ex": ["eine Wunde an der Schläfe"]}, "body::other immediate body attributes": {"l": "other immediate body attributes", "def": "Sammelkategorie für wahrnehmungs-unmittelbare Attribute, die noch nicht in der Taxonomie berücksichtigt sind", "de": "", "ex": []}, "body::shoulders": {"l": "shoulders", "def": "Schultern", "de": "", "ex": []}, "dress::aesthetic": {"l": "aesthetic", "def": "Attributes expressing an aesthetic judgment based on internalized standards of taste or beauty. Examples: „elegant“, „tasteful”, „stylish“, „ugly”", "de": "", "ex": ["sie trug ein elegantes, aber unordentlich zerknittertes Negligé"]}, "body::group-related general": {"l": "group-related general", "def": "Markierung eines Körpers oder Körperteils als spezifisch für eine soziale Gruppe. Der Tag group-related general wird dann vergeben, wenn es um eine sehr allgemein gehaltene Gruppe, nicht um eine spezifische soziale Gruppe geht", "de": "", "ex": ["Sie sah aus, als gehöre sie nicht hierher", "eine fremdartige Erscheinung"]}, "dress::stitches": {"l": "stitches", "def": "“Refers to portions of thread left in fabric or another material by the in and out movement of a threaded needle through the thickness or surface of the material. It also refers to the loops of thread created on a needle in knitting or other needlework.” (AAT) Deutsch: Naht", "de": "", "ex": []}, "body::freckles": {"l": "freckles", "def": "Sommersprossen an einem Körperteil als sichtbares Merkmal", "de": "", "ex": ["Sommersprossen auf der Nase"]}, "body::harmony/regularity/symmetry": {"l": "harmony/regularity/symmetry", "def": "Ebenmäßigkeit, Symmetrie oder Harmonie des Körpers oder eines Körperteils, häufig der Gesichtszüge. Häufig mit wertender Komponente verbunden", "de": "", "ex": []}, "dress::anklets": {"l": "anklets", "def": "“Ornamental bands, rings, or chains worn around the ankle.” (AAT)", "de": "", "ex": []}, "dress::accessories carried": {"l": "accessories carried", "def": "“Items that do not form the primary articles of clothing, but are instead the smaller articles of dress, and that are carried, as opposed to worn on the body.” (AAT) Hinweis: Den Wert accessories carried general vergeben wir, wenn es allgemein um solche Accessories geht", "de": "", "ex": []}, "dress::colors level 1": {"l": "colors level 1", "def": "Mit colors level 1 annotieren wir basale, einfache, also nicht zusammengesetzte Farbtöne: blau, rot, gelb, grün, orange, pink, lila, türkis, schwarz, weiß, grau, braun sowie deren Synonyme und analoge Ausdrücke. Hinweis: Sowohl Farbtöne des Levels 1 als auch des Levels 2 können zusätzlich hinsichtlich des color value oder der anderen farbbezogenen Attribute näher spezifiziert werden", "de": "", "ex": ["schwarzes Haar", "blonde Haare"]}, "body::fingers": {"l": "fingers", "def": "Finger", "de": "", "ex": []}, "body::averageness/conventionality": {"l": "averageness/conventionality", "def": "Normentsprechung bzw. Auffälligkeit eines Körpers oder Körperteils. Orthogonal zu attractiveness — ein unkonventionelles Gesicht kann attraktiv oder unattraktiv sein. Häufig mit wertender Komponente verbunden", "de": "", "ex": ["Der Herr hat eine so außergewöhnlich große Hand! [...] ein Gesicht von eigenartiger Schönheit."]}, "body::lower backs": {"l": "lower backs", "def": "Unterer Rücken", "de": "", "ex": []}, "body::nipples": {"l": "nipples", "def": "Brustwarzen", "de": "", "ex": []}, "dress::technique": {"l": "technique", "def": "Art und Weise der Herstellung der Komponente oder des Attributs, z.B. handgemacht, gestrickt, genäht, gestickt usw", "de": "", "ex": ["“[...] die blaue Jacke an den Rändern mit bunter Seide gestickt [...]” Hinweis zum", "“gestickt” hier als trimming und technique annotiert"]}, "body::knees": {"l": "knees", "def": "Knie", "de": "", "ex": []}, "body::other parts of upper extremities": {"l": "other parts of upper extremities", "def": "Sammelkategorie für Teile der oberen Extremitäten, die noch nicht in der Taxonomie berücksichtigt sind", "de": "", "ex": []}, "body::class/occupation": {"l": "class/occupation", "def": "Markierung eines Körpers oder Körperteils als spezifisch für eine als berufs- oder klassenspezifisch konstruierte Gruppe", "de": "", "ex": []}, "body::foreheads": {"l": "foreheads", "def": "Stirn", "de": "", "ex": []}, "body::cheeks": {"l": "cheeks", "def": "Wangen", "de": "", "ex": []}, "dress::other immediate supplement attributes": {"l": "other immediate supplement attributes", "def": "Sammelkategorie für Informationen über rohe Attribute die bislang nicht in der Taxonomie berücksichtigt sind", "de": "", "ex": []}, "dress::function-related general": {"l": "function-related general", "def": "Attributes indicating the intended purpose, occasion, or context for which a garment is worn. The function is not directly visible but conventionally associated with the garment type", "de": "", "ex": []}, "body::muscles": {"l": "muscles", "def": "Muskeln als durch die Körperoberfläche sichtbares oder tastbares Merkmal an einem Körperteil. Hinweis: Muskeln sind anatomisch innen, werden aber durch ihre Kontur wahrnehmbar", "de": "", "ex": ["die Muskeln seiner Unterarme zeichneten sich ab"]}, "body::voice": {"l": "voice", "def": "", "de": "", "ex": []}, "dress::watches": {"l": "watches", "def": "“Timepieces small and convenient enough to be carried about on a person.” (AAT)", "de": "", "ex": []}, "dress::other body-related": {"l": "other body-related", "def": "Body-related attributes not captured by the defined subcategories", "de": "", "ex": []}, "body::brightness": {"l": "brightness", "def": "Der Grad der Helligkeit oder Dunkelheit einer Körperoberfläche, unabhängig von der Farbe", "de": "", "ex": []}, "body::voluptuousness": {"l": "voluptuousness", "def": "", "de": "", "ex": []}, "body::eyelids": {"l": "eyelids", "def": "Augenlider", "de": "", "ex": []}, "body::jaws": {"l": "jaws", "def": "Kiefer", "de": "", "ex": []}, "dress::color-related properties": {"l": "color-related properties", "def": "Typische farbbezogene Eigenschaften wie schwach, stark, tief, warm, kalt, blass usw. (außer color value, da dieser als eigene Kategorie erfasst wird). Hinweis: Wird nur zusammen mit Farbe annotiert", "de": "", "ex": []}, "dress::modernity": {"l": "modernity", "def": "Attributes situating a garment with respect to current fashion — whether in or out of fashion. Examples: „fashionable“, „à la mode”, „old-fashioned“, „outmoded”", "de": "", "ex": []}, "body::other movement": {"l": "other movement", "def": "Restkategorie für habituelle Bewegungsbeschreibungen, die nicht klar unter gait, gesture oder posture fallen", "de": "", "ex": []}, "body::palms of hand": {"l": "palms of hand", "def": "Handflächen", "de": "", "ex": []}, "dress::collars": {"l": "collars", "def": "“Shaped articles worn at the neckline of a garment, either separate or attached.” (AAT) Hinweis: Wenn ein Kragen als eigenständiges Accessoire getragen wird annotieren wir ihn in der Kategorie accessories worn nicht als Teil eines Kleidungsstücks. Deutsch: Krägen", "de": "", "ex": []}, "body::eyebrows": {"l": "eyebrows", "def": "Augenbrauen", "de": "", "ex": []}, "body::armpits": {"l": "armpits", "def": "Achselhöhlen", "de": "", "ex": []}, "body::wrists": {"l": "wrists", "def": "Handgelenke", "de": "", "ex": []}, "dress::civilian": {"l": "civilian", "def": "Zivilkleidung im Kontrast zur Uniform — explizit nicht-uniformierte Kleidung im Rollenkontext („in Zivil\")", "de": "", "ex": []}, "dress::suits": {"l": "suits", "def": "“Sets of two or more garments made to harmonize or match in color. Also, any costume designed to be worn for a special purpose or under particular conditions, such as a space suit or a snowsuit.” (AAT)", "de": "", "ex": []}, "body::other optical properties": {"l": "other optical properties", "def": "Andere optische Eigenschaften als brightness, also z.B. Glanz, Mattheit, Transparenz", "de": "", "ex": ["glänzende Haut"]}, "dress::cuff links": {"l": "cuff links", "def": "“Rectangular bands, often made of cloth or metal, made to hold cuffs of garments in place. At each end is a button or metal pin to attach the band to the cuff's buttonhole.” (AAT)", "de": "", "ex": []}, "body::upper arms": {"l": "upper arms", "def": "Oberarme", "de": "", "ex": []}, "dress::economic/value": {"l": "economic/value", "def": "Attributes referring to the monetary value or economic status signaled by clothing. Examples: „expensive“, „cheap”, „affordable“, „priceless”", "de": "", "ex": ["[…] und du wirst doch nicht die kostbaren Gewänder alle tragen […]"]}, "dress::colors level 2": {"l": "colors level 2", "def": "Hierunter fassen wir alle hinsichtlich des Farbtons spezifischeren Ausdrücke als die in color level 1. Häufig, aber nicht immer sind das zusammengesetzte Ausdrücke, z.B. goldblond, pechschwarz, aschgrau, kupferrot, elfenbeinfarben", "de": "", "ex": ["Sie hatte pechschwarzes Haar", "[...] die Farbe des Haares war aschblond [...]"]}, "body::earlobes": {"l": "earlobes", "def": "Ohrläppchen", "de": "", "ex": []}, "dress::component accessories": {"l": "component accessories", "def": "zum Kleidungsstück gehörige objekthafte accessories (Schleifen, Rüschen etc.)", "de": "", "ex": []}, "dress::boots": {"l": "boots", "def": "“Footwear, the leg of which extends above the ankle joint.” (AAT) Er hatte seinen Anzug gewechselt, trug kurze Beinkleider und Stulpenstiefel, [...]", "de": "", "ex": []}, "body::colors general": {"l": "colors general", "def": "Farbtöne. Hinweis: Den Wert colors general vergeben wir, wenn wir erfahren, dass ein Farbton vorliegt aber nicht welcher", "de": "", "ex": []}, "dress::bands/ribbons": {"l": "bands/ribbons", "def": "Deutsch: Bänder Schnüre", "de": "", "ex": []}, "dress::brightness": {"l": "brightness", "def": "Der Grad der Helligkeit oder Dunkelheit einer Körperoberfläche, unabhängig von der Farbe", "de": "", "ex": []}, "body::shins": {"l": "shins", "def": "Schienbeine", "de": "", "ex": []}, "body::color value": {"l": "color value", "def": "Der Grad der Helligkeit oder Dunkelheit eines Farbtons. Wird nur zusammen mit Farbe annotiert. Hinweis: Wenn es um Helligkeit/Dunkelheit eines Körperteils jenseits der Farbe geht, wird brightness annotiert", "de": "", "ex": ["dunkelbraunes Haar"]}, "dress::way of wearing immediate": {"l": "way of wearing immediate", "def": "Art und Weise, wie das Kleidungsstück oder Kleidungsteilstück von der Figur getragen wird. Hinweis: Placement und andere eigene Kategorien, bei denen man ebenfalls etwas über die Art und Weise des Getragen werdens erfährt (z.B. placement9 werden eigens erfasst und nicht zusätzlich mit way of wearing", "de": "", "ex": ["Er war so ein Mann, der gerne den Rock weit offen trägt, [...]"]}, "dress::cut": {"l": "cut", "def": "Attributes characterizing a garment by its cut or tailoring as a style feature, beyond its basic category name. Examples: „well-cut“, „close-cut”, „flowing\"", "de": "", "ex": []}, "body::shape": {"l": "shape", "def": "Die Form oder charakteristische Konfiguration eines Körperteils, einschließlich seiner Konturen — als direkt sinnlicher Eindruck wiedergegeben", "de": "", "ex": ["Die eine hatte ein rundes Gesicht, [...]"]}, "dress::supplement": {"l": "supplement", "def": "Unter “Supplement” verstehen wir den Teil des in der Regel intentional gestalteten äußeren Erscheinungsbildes, bei dem dem Körper etwas Gegenständliches ‘hinzugefügt’ wird – Kleidung oder Accessories. Den Wert “supplement general” vergeben wir, wenn es um die Kleidung der Figur insgesamt geht, wobei wir annehmen, dass sowohl Accessories und Clothing (s.u.) gemeint sind oder gemeint sein könnten", "de": "", "ex": ["Die Räuber trugen die Tracht der Hirten, [...] Erläuterung: Wir können nicht ausschließen, dass zur Tracht der Hirten auch Accessories gehören und annotieren deshalb supplement general", "Er trug die Kleidung eines Westläufers, hatte eine Flinte auf dem Rücken hängen und in dem Gürtel einen Revolver, ein Bowiemesser und – – – was noch mehr stecken? Erläuterung: Auch hier können wir nicht ausschließen, dass zur Kleidung der Westläufer auch Accessoires gehören"]}, "dress::other material": {"l": "other material", "def": "Alle Materialien außer Stoffe, z.B. Leder, Stroh, Pelz", "de": "", "ex": ["xyz"]}, "body::knuckles": {"l": "knuckles", "def": "Fingerknöchel", "de": "", "ex": []}, "dress::corsets": {"l": "corsets", "def": "“Smoothly fitted undergarments extending from or below the bust down to the waist or below, stiffened by strips of steel or whalebone, or with casing for a busk, sometimes limbered by elastic goring, sometimes tightened by lacing, and fastened by hooks. It is usually worn by women for support and molding of the figure including the ribcage and possibly the hips.” (AAT)", "de": "", "ex": []}, "dress::accessories": {"l": "accessories", "def": "“Items that do not form the primary articles of clothing, but are instead the smaller articles of dress, such as [...] gloves, [...] jewelry, etc.” (AAT) Hinweis: Im AAT werden auch Schuhe und Kopfbedeckungen zu den Accessories gezählt. Hier werden sie dagegen dem Clothing zugerechnet. Hinweis: Der Wert accessories general wird vergeben, wenn es allgemein um die Accessories geht", "de": "", "ex": []}, "dress::other optical properties": {"l": "other optical properties", "def": "Andere optische Eigenschaften als brightness, also z.B. Glanz, Mattheit, Transparenz", "de": "", "ex": ["glänzende Haut"]}, "dress::other mediated supplement attributes": {"l": "other mediated supplement attributes", "def": "Attributes distant to perception that do not fit any of the defined categories", "de": "", "ex": []}, "body::nape of neck": {"l": "nape of neck", "def": "Nacken", "de": "", "ex": []}, "dress::tears": {"l": "tears", "def": "Risse in einem Kleidungsstück als lokalisierbares Merkmal. Deutsch: Risse", "de": "Risse", "ex": []}, "dress::thickness": {"l": "thickness", "def": "Die Dicke oder Dünne eines Körperteils", "de": "", "ex": ["Wirklich, er hatte es nicht bedacht, daß die Base selber einen dicken Hals hatte [...]"]}, "dress::other accessories worn": {"l": "other accessories worn", "def": "", "de": "", "ex": []}, "dress::caps": {"l": "caps", "def": "“Brimless head coverings, often made with a visor.” (AAT)", "de": "", "ex": ["[...] auf dem Kopf trug sie eine Karmesinmütze von Sammet [...]"]}, "dress::stains": {"l": "stains", "def": "Flecken auf einem Kleidungsstück als lokalisierbares Merkmal. Deutsch: Flecken", "de": "Flecken", "ex": []}, "dress::sandalettes/sandals": {"l": "sandalettes/sandals", "def": "“Shoes consisting essentially of a sole fastened to the foot by straps, strips, or cords.” (AAT)", "de": "", "ex": []}, "body::other mediated body attributes": {"l": "other mediated body attributes", "def": "Sammelkategorie für wahrnehmungsferne Attribute, die sich keiner der obigen Subkategorien zuordnen lassen", "de": "", "ex": []}, "dress::closure": {"l": "closure", "def": "“Devices that fasten or hold together separate parts of objects made from textiles.” (AAT) Hinweis: Definition bezieht sich dort auf “fasteners”, in CC wird closure als Oberbegriff für Knöpfe, Reißverschluss usw. verwendet, in AAT fasteners; ich betrachte closure und fasteners hier daher als synonym. Hinweis: ausgenommen buttons, diese selbst", "de": "", "ex": []}, "dress::body-related general": {"l": "body-related general", "def": "Attributes describing the relationship between a garment and the body of the wearer, including fit and the effect on the body’s perceived appearance", "de": "", "ex": []}, "body::upper extremities": {"l": "upper extremities", "def": "Region obere Extremitäten — übergeordnete Kategorie für Arme und Hände", "de": "", "ex": []}, "dress::clothing": {"l": "clothing", "def": "“Coverings for the torso, limbs, hands, feet, and head for warmth, fashion, or to cover nudity. It generally excludes other items of costume such as jewelry, crowns, and other accessories that are purely decorative or symbolic and have no practical function.” (AAT) Hinweis: Der Wert clothing general wird vergeben, wenn es allgemein um die Kleidung, aber nicht um die Accessories geht", "de": "", "ex": []}, "body::beards": {"l": "beards", "def": "Bart", "de": "", "ex": []}, "dress::mourning": {"l": "mourning", "def": "Trauer", "de": "", "ex": []}, "body::placement": {"l": "placement", "def": "Die Stelle, an der ein Körperteil oder ein Merkmal an einem anderen Körperteil lokalisiert ist", "de": "", "ex": ["ein Muttermal auf der linken Wange"]}, "body::nobleness": {"l": "nobleness", "def": "Markierung eines Körpers oder seiner Teile als nobel oder edel (bzw. unedel usw.). Abgrenzung zu fineness: Bei fineness geht es um die “Feinheit” oder “Zierlichkeit” eines Körperteils, kann muss aber nicht zusammen mit nobleness auftreten. Abgrenzung zu class/occupation: Eine Verwandtschaft gibt es auch zu class/occupation, dort geht es eher um die Betonung der Gruppenzugehörigkeit", "de": "", "ex": ["Er hatte ein schmales, edles, etwas blasses Gesicht"]}, "exterior": {"l": "exterior", "def": "", "de": "", "ex": []}, "dress::gaiters": {"l": "gaiters", "def": "“Coverings of cloth, leather, or similar material worn over the ankle and sometimes lower leg.” (AAT)", "de": "", "ex": []}, "body::fineness": {"l": "fineness", "def": "Feinheit bzw. Zartheit oder Zierlichkeit des Körpers oder seiner Teile, insbesondere der Gesichtszüge. Häufig mit wertender Komponente verbunden", "de": "", "ex": ["Und dann hatte sie so feine, weiße Finger und Handgelenke [...]"]}, "body::posture": {"l": "posture", "def": "Habituelle Körperhaltung (Stand- und Sitzhaltung, Schulter- und Rückenführung)", "de": "", "ex": ["aufrechte Haltung, mit hängenden Schultern, gebeugt, stets gerade. Abgrenzung zu shape (close attribute): Eine gebeugte Haltung ist habituell-dynamisch (posture); ein gekrümmter Rücken als anatomisches Merkmal ist statisch und wird als shape am Körperteil backs annotiert. Faustregel: Wenn die Beschreibung eine Art sich zu halten meint, ist es posture; wenn sie eine Form/Beschaffenheit des Körpers meint, ist es shape // Filter: Attribut-Teilbäume + parts of body parts + parts of supplements
function skip(lbl) {
  return /attributes\s*$/i.test(lbl)
      || /^parts of body parts$/i.test(lbl)
      || /^parts of supplements$/i.test(lbl);
}

// Rohdaten-Baum aufbauen (alle children als property)
function makeNode(id) {
  var nd  = DATA.nodes[id] || {};
  var lbl = nd.l || id;
  var kids = (DATA.children[id] || [])
    .filter(function(k) { return !skip((DATA.nodes[k] || {}).l || k); })
    .map(makeNode);
  var out = { id: id, name: lbl, def: nd.def || '' };
  if (kids.length) out.children = kids;
  return out;
}

var treeData = {
  id: 'figur', name: 'Figur', def: '',
  children: [makeNode(DATA.root)]
};

// D3-Hierarchie
var root = d3.hierarchy(treeData, function(d) { return d.children; });
var nextId = 0;
root.descendants().forEach(function(d) {
  d.uid = ++nextId;
  d.x0 = 0; d.y0 = 0;
  // Erst ab Tiefe 3 zuklappen → body/dress (Tiefe 2) bleiben sichtbar
  if (d.depth >= 3 && d.children) {
    d._children = d.children;
    d.children  = null;
  }
});

// Layout: NX=100 damit Labels nicht überlappen
var NX = 100, NY = 82, DUR = 350;
var treeLayout = d3.tree().nodeSize([NX, NY]);

var svgEl = document.getElementById('tree');
var svg   = d3.select('#tree');
var g     = svg.append('g');

var zoom = d3.zoom()
  .scaleExtent([0.02, 6])
  .on('zoom', function(e) { g.attr('transform', e.transform); });
svg.call(zoom);

// Farben (Grautöne nach Tiefe)
function col(d) {
  if (d.depth === 0) return '#111827';
  if (d.depth === 1) return '#374151';
  if (d.depth === 2) return '#4b5563';
  return '#6b7280';
}
function radius(d) {
  return d.depth === 0 ? 9 : d.depth <= 2 ? 7 : (d._children ? 6 : 5);
}

// Label in max. 2 Zeilen aufteilen (max. 14 Zeichen pro Zeile)
function makeLines(name) {
  var maxC = 14;
  var words = name.split(' ');
  var lines = [], cur = '';
  words.forEach(function(w) {
    var cand = cur ? cur + ' ' + w : w;
    if (cand.length > maxC && cur) { lines.push(cur); cur = w; }
    else cur = cand;
  });
  if (cur) lines.push(cur);
  return lines.slice(0, 2);
}

// Label-Rendering (Tspans für Umbruch)
function renderLabel(textSel) {
  textSel.each(function(d) {
    var el = d3.select(this);
    el.selectAll('*').remove();
    el.attr('text-anchor', 'middle')
      .attr('font-size', d.depth <= 2 ? '9px' : '8px')
      .attr('font-weight', d.depth <= 2 ? '600' : '400')
      .attr('fill', '#374151')
      .attr('font-family', 'ui-sans-serif, sans-serif');
    var lines = makeLines(d.data.name);
    var r = radius(d);
    lines.forEach(function(line, i) {
      el.append('tspan')
        .attr('x', 0)
        .attr('dy', i === 0 ? (r + 5) + 'px' : '9px')
        .text(line);
    });
  });
}

// Tooltip
var tip = document.getElementById('tip');
function esc(s) {
  return (s || '').replace(/[&<>]/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c];
  });
}
function showTip(event, d) {
  var nc = d._children ? d._children.length : 0;
  var h = '<div class="tn">' + esc(d.data.name) + '</div>';
  if (d.data.def)
    h += '<div class="td">' + esc(d.data.def.slice(0, 220))
       + (d.data.def.length > 220 ? '&hellip;' : '') + '</div>';
  if (nc) h += '<div class="tk">&#9658;&nbsp;' + nc + ' Knoten zugeklappt</div>';
  tip.innerHTML = h;
  tip.style.display = 'block';
  var x = event.clientX + 14, y = event.clientY - 8;
  if (x + 310 > window.innerWidth) x = event.clientX - 320;
  tip.style.left = Math.max(0, x) + 'px';
  tip.style.top  = Math.max(0, y) + 'px';
}
function hideTip() { tip.style.display = 'none'; }

// Update
function update(src) {
  treeLayout(root);
  var nodes = root.descendants();
  var links = root.links();

  document.getElementById('info').textContent =
    nodes.length + ' von ' + countAll(root)
    + ' Knoten · Klick = aus-/einklappen · Scroll = zoomen';

  var diagV = d3.linkVertical()
    .x(function(d) { return d.x; }).y(function(d) { return d.y; });

  // Links
  var lk = g.selectAll('.link').data(links, function(d) { return d.target.uid; });
  lk.enter().insert('path', 'g').attr('class', 'link')
    .attr('d', function() {
      var o = { x: src.x0 || 0, y: src.y0 || 0 };
      return diagV({ source: o, target: o });
    })
    .merge(lk).transition().duration(DUR).attr('d', diagV);
  lk.exit().transition().duration(DUR)
    .attr('d', function() {
      var o = { x: src.x || 0, y: src.y || 0 };
      return diagV({ source: o, target: o });
    }).remove();

  // Nodes
  var nd = g.selectAll('.node').data(nodes, function(d) { return d.uid; });
  var ne = nd.enter().append('g').attr('class', 'node')
    .attr('transform', function() {
      return 'translate(' + (src.x0 || 0) + ',' + (src.y0 || 0) + ')';
    })
    .on('click',      function(e, d) { toggle(d); })
    .on('mousemove',  function(e, d) { showTip(e, d); })
    .on('mouseleave', hideTip);
  ne.append('circle');
  ne.append('text');

  var nu = ne.merge(nd);
  nu.transition().duration(DUR)
    .attr('transform', function(d) {
      return 'translate(' + d.x + ',' + d.y + ')';
    });
  nu.select('circle').transition().duration(DUR)
    .attr('r', radius)
    .attr('fill', col)
    .attr('stroke', function(d) { return d3.color(col(d)).darker(.6); })
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', function(d) { return d._children ? '3,2' : null; });

  // Labels mit Umbruch neu rendern
  nu.select('text').call(renderLabel);

  nd.exit().transition().duration(DUR)
    .attr('transform', function() {
      return 'translate(' + (src.x || 0) + ',' + (src.y || 0) + ')';
    }).remove();

  nodes.forEach(function(d) { d.x0 = d.x; d.y0 = d.y; });
}

// Alle sichtbaren Knoten in den Viewport einpassen
function fitVisible(dur) {
  var nodes = root.descendants();
  if (!nodes.length) return;
  var xs = nodes.map(function(d) { return d.x; });
  var ys = nodes.map(function(d) { return d.y; });
  var xMin = Math.min.apply(null, xs);
  var xMax = Math.max.apply(null, xs);
  var yMin = Math.min.apply(null, ys);
  var yMax = Math.max.apply(null, ys);
  var pad  = { x: NX * 2, top: 120, bot: 80 };
  var W = svgEl.getBoundingClientRect().width  || window.innerWidth;
  var H = svgEl.getBoundingClientRect().height || (window.innerHeight - 36);
  var scaleX = W  / (xMax - xMin + pad.x * 2);
  var scaleY = H  / (yMax - yMin + pad.top + pad.bot);
  var scale  = Math.min(scaleX, scaleY, 1.4);
  scale = Math.max(scale, 0.04);
  var tx = W  / 2 - (xMin + xMax) / 2 * scale;
  var ty = pad.top - yMin * scale;
  svg.transition().duration(dur != null ? dur : 450)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function toggle(d) {
  if (d.children)       { d._children = d.children; d.children = null; }
  else if (d._children) { d.children = d._children; d._children = null; }
  update(d);
  setTimeout(function() { fitVisible(); }, DUR + 30);
}
function countAll(n) {
  var c = 1;
  (n.children || n._children || []).forEach(function(k) { c += countAll(k); });
  return c;
}
function expandAll() {
  root.descendants().forEach(function(d) {
    if (d._children) { d.children = d._children; d._children = null; }
  });
  update(root);
  setTimeout(function() { fitVisible(); }, DUR + 30);
}
function collapseAll() {
  root.descendants().forEach(function(d) {
    if (d.depth >= 2 && d.children) { d._children = d.children; d.children = null; }
  });
  update(root);
  setTimeout(function() { fitVisible(); }, DUR + 30);
}
function resetView() { fitVisible(500); }

// Init: Zoom zuerst, dann rendern
function init() {
  var w = svgEl.getBoundingClientRect().width || window.innerWidth;
  svg.call(zoom.transform, d3.zoomIdentity.translate(w / 2, 120));
  update(root);
  setTimeout(function() { fitVisible(0); }, 100);
}

if (document.readyState === 'complete') { init(); }
else { window.addEventListener('load', init); }

document.getElementById('btn-expand').onclick   = expandAll;
document.getElementById('btn-collapse').onclick = collapseAll;
document.getElementById('btn-reset').onclick    = resetView;
window.addEventListener('resize', function() { update(root); });
</script>
</body>
</html>
