["оҖҖbreiteоҖҒ Schultern, оҖҖschmaleоҖҒ HГјften, оҖҖschmalerоҖҒ Mund"]}, "body::toes": {"l": "toes", "def": "Zehen", "de": "", "ex": []}, "body::body parts": {"l": "body parts", "def": "", "de": "", "ex": []}, "dress::pockets": {"l": "pockets", "def": "Flat pouchlike components stitched into or onto a garment, accessible through a finished opening typically convenient to the hand.вҖқ (AAT) Deutsch: (Innen-)Taschen", "de": "", "ex": []}, "dress::other clothing for the lower body": {"l": "other clothing for the lower body", "def": "", "de": "", "ex": []}, "dress::shorts/trousers": {"l": "shorts/trousers", "def": "вҖңExposed bifurcated garments which extend from waist or hips to the ankle or sometimes to the knee or just below.вҖқ (AAT)", "de": "", "ex": []}, "modification": {"l": "modification", "def": "", "de": "", "ex": []}, "body::colors level 1": {"l": "colors level 1", "def": "Mit colors level 1 annotieren wir basale, einfache, also nicht zusammengesetzte FarbtГ¶ne: blau, rot, gelb, grГјn, orange, pink, lila, tГјrkis, schwarz, weiГҹ, grau, braun sowie deren Synonyme und analoge AusdrГјcke. Hinweis: Sowohl FarbtГ¶ne des Levels 1 als auch des Levels 2 kГ¶nnen zusГӨtzlich hinsichtlich des color value oder der anderen farbbezogenen Attribute nГӨher spezifiziert werden", "de": "", "ex": ["оҖҖschwarzesоҖҒ Haar", "оҖҖblondeоҖҒ Haare"]}, "dress::trimming": {"l": "trimming", "def": "вҖңCollectively used for decorative or additional material serving to finish, decorate, or complete.вҖқ (AAT) Hinweis: Direkte VerГӨnderung am KleidungsstГјck im Gegensatz zu Objekthaftigkeit Deutsch: Ornamente, Verzierung, Besatz", "de": "", "ex": []}, "body::eyelashes": {"l": "eyelashes", "def": "Wimpern", "de": "", "ex": []}, "body::condition mediated": {"l": "condition mediated", "def": "Gesamtzustand eines KГ¶rpers oder KГ¶rperteils. HГӨufig mit wertender Komponente verbunden. (FГјr Abgrenzung zu condition immediate s. 3.4.3.1)", "de": "", "ex": []}, "dress::lacings": {"l": "lacings", "def": "SchnГјrung", "de": "", "ex": []}, "dress::fitting mediated": {"l": "fitting mediated", "def": "Attributes describing how well a garment fits the wearerвҖҷs body. Examples: вҖһtoo tightвҖң, вҖһtoo looseвҖқ, вҖһwell-fittingвҖң, вҖһtailor-madeвҖқ. (kann evaluativ sein)", "de": "", "ex": ["eng anliegend"]}, "dress::trains": {"l": "trains", "def": "вҖңExtended parts of a skirt, gown, or state robe that lie on the floor and trail behind the wearer, either separate or attached.вҖқ (AAT) Deutsch: Schleppe", "de": "", "ex": []}, "dress": {"l": "dress", "def": "", "de": "", "ex": []}, "dress::hoods": {"l": "hoods", "def": "вҖңSoft coverings for the head and neck, and sometimes extending to the shoulders, either separate or attached to a garment.вҖқ (AAT)", "de": "", "ex": []}, "dress::earrings": {"l": "earrings", "def": "вҖңEar ornaments worn suspended from a bent wire or a thin loop passed through a hole pierced in the lobe of the ear or clipped or screwed to the lobe.вҖқ (AAT)", "de": "", "ex": []}, "dress::mediated supplement attributes": {"l": "mediated supplement attributes", "def": "Attributes of clothing items that are not directly perceptible through sensory observation but are inferred or known through cultural, social, or contextual knowledge", "de": "", "ex": []}, "dress::armor": {"l": "armor", "def": "вҖңRefers generally to that category of costume designed to be worn to protect the body in combat.вҖқ (angelehnt an AAT) Hinweis: Waffen und RГјstungen werden grundsГӨtzlich als Grenzfall von Dress betrachtet. Zu behandeln ist dieser wie in den Guidelines zur Figurenbeschreibung: вҖңExplizite ErwГӨhnungen von Waffen betrachten wir dann als hinreichend fГјr ГӨuГҹere Figurenbeschreibung, wenn sie als Teil des вҖҳOutfitsвҖҷ einer Figur erscheinen. Typisch ist dann, dass die Figur die Waffen am KГ¶rper trГӨgt und/oder dass auch andere Aspekte der AuГҹenseite bzw. der Kleidung beschrieben werden. Wir betrachten solche ErwГӨhnungen nicht als hinreichend fГјr ГӨuГҹere Figurenbeschreibung, wenn der Fokus primГӨr auf der Benutzung der Waffen (im Kampf) oder auf der Bewaffnung liegt.вҖқ", "de": "", "ex": []}, "dress::plaids": {"l": "plaids", "def": "вҖңMain garments for the upper and lower body consisting of long, rectangular pieces of cloth, often but not always of tartan.вҖқ (AAT)", "de": "", "ex": []}, "dress::holes": {"l": "holes", "def": "LГ¶cher in einem KleidungsstГјck (durchgescheuert, gerissen oder absichtlich geschnitten) als lokalisierbares Merkmal. Deutsch: LГ¶cher", "de": "LГ¶cher", "ex": []}, "dress::hosiery": {"l": "hosiery", "def": "вҖңLeg coverings, sometimes woven in one with panties, that extend to the ankle and usually cover the foot; generally knitted or woven, sheer or opaque, and of lightweight or heavy fabric. Distinguish from \"footwear\", which is primarily worn as coverings for the feet.вҖқ (AAT)", "de": "", "ex": []}, "body::length": {"l": "length", "def": "Die LГӨnge eines KГ¶rperteils", "de": "", "ex": ["оҖҖlangeоҖҒ Arme, оҖҖkurzeоҖҒ Finger, оҖҖlangerоҖҒ Hals, оҖҖlangeоҖҒ Haare"]}, "dress::other parts of supplements": {"l": "other parts of supplements", "def": "", "de": "", "ex": []}, "body::scars": {"l": "scars", "def": "Narben an einem KГ¶rperteil als dauerhaft sichtbares Merkmal", "de": "", "ex": ["eine Narbe auf der Wange, narbige HГӨnde"]}, "dress::condition immediate": {"l": "condition immediate", "def": "вҖңCondition is the overall state of an object, being, or environment, including physical characteristics such as appearance, pristineness, level of damage, completeness, working order, or quality.вҖқ (AAT) Hinweis: Wir fassen hierunter verschiedene Arten von Zustand eines KleidungsstГјcks oder Teil eines KleidungsstГјcks, dazu gehГ¶rt etwa dessen Sauberkeit oder Abnutzungsgrad. Im Ggs. zu вҖңcondition mediatedвҖқ wird diese hier in direkter Form angegeben, z.B. wird ein KleidungsstГјck fleckig oder fadenscheinig genannt", "de": "", "ex": ["Ihm gegenГјber saГҹ eine bereits ГӨltere Dame in einer seidenen, оҖҖetwas fadenscheidigenоҖҒ Fransenmantille, [...]", "[...] eine der Damen, die eine вҖ“ natГјrlich оҖҖvГ¶llig durchschwitzteоҖҒ вҖ“ seidene Bluse trug, [...]"]}, "dress::garment linings": {"l": "garment linings", "def": "Interior components of garments stitched inside clothing to provide support and warmth, or simply as a finish.вҖқ (AAT) Deutsch: Futter", "de": "Futter", "ex": []}, "body::temperature": {"l": "temperature", "def": "Die KГ¶rpertemperatur oder KГ¶rperteiltemperatur. Hinweis: gemeint ist hier nur die explizite, wГ¶rtliche Temperatur, keine metaphorische WГӨrme oder KГӨlte (warmer Blick)", "de": "", "ex": ["оҖҖwarmeоҖҒ HГӨnde"]}, "body::chins": {"l": "chins", "def": "Kinn", "de": "", "ex": []}, "body::lower arms": {"l": "lower arms", "def": "Unterarme", "de": "", "ex": []}, "dress::underskirts": {"l": "underskirts", "def": "вҖңSkirts worn beneath another; use especially for those underskirts designed to be seen.вҖқ (AAT)", "de": "", "ex": []}, "body::breasts": {"l": "breasts", "def": "BrГјste", "de": "", "ex": []}, "dress::pantofles/slippers": {"l": "pantofles/slippers", "def": "вҖңMulelike footwear with a vamp and no quarters worn from the 15th into the 17th century and having two different functions, as slippers intended for indoor use and as overshoes with a thick sole, often of cork, intended for outdoor use. For women's shoes or overshoes with a mulelike upper and a high platform sole, use \"chopines.\"вҖқ (AAT)", "de": "", "ex": []}, "body::palates": {"l": "palates", "def": "Gaumen", "de": "", "ex": []}, "body::back of head": {"l": "back of head", "def": "Hinterkopf", "de": "", "ex": []}, "dress::walking sticks": {"l": "walking sticks", "def": "вҖңSticks held in the hand and used for support in walking, especially as a fashionable and often ornamental accessory when taking a walk.вҖқ (AAT)", "de": "", "ex": []}, "body::nostrils": {"l": "nostrils", "def": "NasenlГ¶cher", "de": "", "ex": []}, "dress::ponchos": {"l": "ponchos", "def": "вҖңBlanketlike garments, usually square or oblong with a slit in the center for the head, originating in South America. Also, similar garments used elsewhere, including those made of water-repellent fabric and usually having a hood, and when not worn, used as a blanket or tarpaulin.вҖқ (AAT)", "de": "", "ex": []}, "dress::other clothing for upper and lower body": {"l": "other clothing for upper and lower body", "def": "", "de": "", "ex": []}, "dress::dressing gowns": {"l": "dressing gowns", "def": "вҖңMen's or women's loose, informal garments, often coat-like, worn when partly or fully undressed. Generally warm and often full-length; may be worn with a rope belt.вҖқ", "de": "", "ex": ["xyz"]}, "body::backs": {"l": "backs", "def": "RГјcken", "de": "", "ex": []}, "dress::badges": {"l": "badges", "def": "вҖңObjects bearing special or distinctive marks and worn for decoration or to signify affiliation. Originally, badges were heraldic symbols worn as identifying marks by a knight and his retainers, e.g., a badge of arms. In later use, the term refers to any distinctive device, emblem, or mark worn to indicate a person's affiliation, rank, office, name, or membership in an organization or support for a cause, particularly objects that comprise small pieces of metal, card, plastic, etc., that bear a distinguishing design or words.вҖқ (AAT)", "de": "", "ex": []}, "body::shoulderblades": {"l": "shoulderblades", "def": "SchulterblГӨtter", "de": "", "ex": []}, "dress::hats": {"l": "hats", "def": "вҖңShaped coverings for the head having a brim and crown, or one of the two.вҖқ (AAT)", "de": "", "ex": ["[...] er trug einen zimmetfarbigen Samtrock, und sogar auf einen kleinen dreieckigen оҖҖHutоҖҒ mit goldnen Borten [...]"]}, "dress::alternative color descriptions": {"l": "alternative color descriptions", "def": "Farbbezogene, aber nicht auf Einzelfarben bezogene Beschreibungen wie вҖңbuntвҖқ oder вҖңfarblosвҖқ", "de": "", "ex": []}, "dress::optical properties general": {"l": "optical properties general", "def": "Eigenschaften, die die Interaktion eines KГ¶rperteils mit Licht beschreiben", "de": "", "ex": []}, "dress::dynamic aspects": {"l": "dynamic aspects", "def": "Art und Weise in der sich das KleidungsstГјck oder KleidungsteilstГјck bewegt", "de": "", "ex": ["z.B. wehend"]}, "body::feet": {"l": "feet", "def": "FГјГҹe", "de": "", "ex": []}, "body::uvulas": {"l": "uvulas", "def": "GaumenzГӨpfchen", "de": "", "ex": []}, "body::gait": {"l": "gait", "def": "Charakteristische Art der Fortbewegung вҖ” wie eine Figur typischerweise geht", "de": "", "ex": ["schleppender Gang, federnder Schritt, wiegender Gang, hinkend. Abgrenzung: nur als habituelles Merkmal annotieren, nicht das einmalige Gehen in einer ErzГӨhlsituation"]}, "body::insteps": {"l": "insteps", "def": "FuГҹrГјcken", "de": "", "ex": []}, "dress::necklaces": {"l": "necklaces", "def": "вҖңOrnaments worn around the neck, usually in the form of chains or strands of beads, pearls, stones, or decorative or precious materials, and often including a suspended ornamental pendant. Use \"chokers\" for short, narrow necklaces worn close to the throat. Use \"dog collars (necklaces)\" for wide ornamental bands worn tightly around the neck.вҖқ (AAT)", "de": "", "ex": []}, "dress::skirts": {"l": "skirts", "def": "вҖңMain garments of varying length extending from the waist or hip and covering a part of the lower body. Also, the lower part of a dress, coat, or other garment.вҖқ (AAT)", "de": "", "ex": []}, "body::type": {"l": "type", "def": "Zuordnung zu einem wiedererkennbaren Typ", "de": "", "ex": ["eine kecke оҖҖStupsnaseоҖҒ"]}, "dress::class/occupation": {"l": "class/occupation", "def": "Markierung eines KГ¶rpers oder KГ¶rperteils als spezifisch fГјr eine als berufs- oder klassenspezifisch konstruierte Gruppe", "de": "", "ex": []}, "body::hair": {"l": "hair", "def": "Kopfhaar", "de": "", "ex": []}, "dress::accessories worn": {"l": "accessories worn", "def": "вҖңItems that do not form the primary articles of clothing, but are instead the smaller articles of dress, and that are worn on the body, as opposed to being carried. вҖң (AAT) Hinweis: Den Wert accessories worn general vergeben wir, wenn es allgemein um solche Accessories geht", "de": "", "ex": []}, "dress::wreaths": {"l": "wreaths", "def": "вҖңCostume accessories comprising circular bands of flowers, foilage, or ornamental work worn or bestowed as a mark of honor or victory or worn for purely decorative purposes.вҖқ (AAT) Deutsch: вҖңKrГӨnzeвҖқ", "de": "", "ex": []}, "dress::blouses/shirts/tops": {"l": "blouses/shirts/tops", "def": "tops: вҖңGeneral term for clothing worn on the upper part of the body, above the waist, excluding outerwear and underwear. [...]вҖқ (AAT) shirts: вҖңGenerally refers to various types of main garments for the upper body, made with or without sleeves and worn over or tucked in the waistband of a skirt, trousers, or the like. Usually having a collar, which may be detachable, often a front opening, and sometimes pockets. Specifically often refers to an article of male attire with long sleeves terminating in wristbands or cuffs. It originally referred to undergarments for the upper part of the body, made of linen, calico, flannel, silk, or other washable material; originally always worn next to the skin.вҖқ (AAT) blouses: вҖңMain garments for the upper body, usually lightweight and loose-fitting, made with or without sleeves and worn over or tucked in the waistband of a skirt or trousers. Examples include loose garments worn by workmen, peasants and artists, as well as women's upper body garments of various designs.вҖқ (AAT) Es rug ein kurzes, schwarzes RГ¶ckchen und weiГҹes Faltenhemd, [...]t", "de": "", "ex": []}, "dress::armbands/bracelets": {"l": "armbands/bracelets", "def": "вҖңOrnamental bands or circlets worn on the lower arm. Use \"armlets\" for similar articles worn on the upper arm.вҖқ (AAT) вҖңBands encircling the arm, sometimes worn for decoration, identification, or to signify mourning.вҖқ (AAT)", "de": "", "ex": []}, "dress::belts": {"l": "belts", "def": "вҖңFlexible straps or bands generally encircling the waist or hips or passing over the shoulder and usually having some type of fastener, such as a buckle; worn for decoration, support, or to carry such items as weapons, tools, or money.вҖқ (AAT)", "de": "", "ex": []}, "body::calves of leg": {"l": "calves of leg", "def": "Waden", "de": "", "ex": []}, "body::heads": {"l": "heads", "def": "Region Kopf вҖ” Гјbergeordnete Kategorie fГјr alle Kopfteile", "de": "", "ex": []}, "dress::way of wearing mediated": {"l": "way of wearing mediated", "def": "Ausdruckshaftes вҖһWie\" des Tragens, das eine Haltung/einen Charakterzug projiziert (stolz, wГјrdevoll, nachlГӨssig getragen). Abgrenzung: die rein physische Trageweise (offen, im Nacken) вҶ’ way of wearing immediate", "de": "", "ex": []}, "body::healthiness": {"l": "healthiness", "def": "Gesundheit/Krankheit eines KГ¶rpers oder seiner Teile", "de": "", "ex": []}, "body::other body components": {"l": "other body components", "def": "", "de": "", "ex": []}, "dress::body effect": {"l": "body effect", "def": "Attributes describing the effect a garment has on the perceived appearance or shape of the body. Examples: вҖһslimmingвҖң, вҖһfigure-huggingвҖқ", "de": "", "ex": []}, "body::heels": {"l": "heels", "def": "Fersen", "de": "", "ex": []}, "dress::place": {"l": "place", "def": "Attributes indicating the geographical origin or regional association of a garment. Examples: вҖһViennese fashionвҖң, вҖһimported from ParisвҖқ, вҖһItalian style\"", "de": "", "ex": []}, "dress::turbans": {"l": "turbans", "def": "вҖңHeaddresses consisting of a tight-fitting cap around which is wound a long cloth, originating in eastern Mediterranean and southern Asian countries. Also, headgear of similar appearance which may be constructed differently.вҖқ (AAT)", "de": "", "ex": []}, "body::laps": {"l": "laps", "def": "SchoГҹ", "de": "", "ex": []}, "body::mouths": {"l": "mouths", "def": "Mund", "de": "", "ex": []}, "body::skin color": {"l": "skin color", "def": "вҖңHautfarbeвҖқ als soziales Konstrukt betrachten wir als zwar (noch) sinnlich wahrnehmbar aber als distinkt von rein sinnlichen Farb-AusdrГјcken. Anders als solche Farb-AusdrГјcke ist Hautfarbe kulturell Гјberformt und bezieht sich auf mehr als einen reinen Farb-Ausdruck", "de": "", "ex": []}, "dress::undershirts": {"l": "undershirts", "def": "вҖңShirts, with or without sleeves, worn next to the body and under another shirt. [...]вҖқ (AAT)", "de": "", "ex": []}, "dress::cloaks/coats": {"l": "cloaks/coats", "def": "вҖңMain garments usually fitted to the upper body, extending below the hip line, open at the front or side and generally having sleeves..вҖқ (AAT) auch Frack", "de": "", "ex": ["[...] er trug einen zimmetfarbigen оҖҖSamtrockоҖҒ, und sogar auf einen kleinen dreieckigen Hut mit goldnen Borten [...]"]}, "body::eyes": {"l": "eyes", "def": "Augen", "de": "", "ex": []}, "body::adam's apples": {"l": "adam's apples", "def": "Adamsapfel", "de": "", "ex": []}, "dress::time": {"l": "time", "def": "Attributes situating a garment in time вҖ” whether by historical period, currency with contemporary fashion, or age of the garment. Examples: вҖһold-fashionedвҖң, вҖһmodernвҖқ, вҖһBiedermeier dressвҖң, вҖһmedieval costumeвҖқ", "de": "", "ex": []}, "body::faces": {"l": "faces", "def": "Gesicht", "de": "", "ex": []}, "dress::diadems": {"l": "diadems", "def": "вҖңOrnamental frontals or headbands, often of metal or cloth, may be adorned with jewels; often worn as a symbol of honor or royalty.вҖқ (AAT)", "de": "", "ex": []}, "body::calluses": {"l": "calluses", "def": "Schwielen oder Hornhaut an einem KГ¶rperteil als sichtbares oder tastbares Merkmal", "de": "", "ex": ["schwielige HГӨnde"]}, "dress::helmets": {"l": "helmets", "def": "вҖңAny of various forms of protective coverings for the head, usually made of a hard material, including the outside steel layer of helmets that consist of inner and outer parts.вҖқ (AAT)", "de": "", "ex": []}, "body::color and color-related": {"l": "color and color-related", "def": "Hinweis: color and color-related general wird annotiert, wenn sich die Beschreibung auf die Farbe allgemein bezieht ohne direkte Informationen wie in den Subhierarchien spezifiziert", "de": "", "ex": ["Ihre Haut hatte оҖҖdie Farbe eines warmen SommertagsоҖҒ"]}, "dress::simplicity": {"l": "simplicity", "def": "Attributes indicating the degree of plainness versus ornamentation of a garment. Examples: вҖһplainвҖң, вҖһsimpleвҖқ, вҖһunadornedвҖң, вҖһornateвҖқ, вҖһlavish\"", "de": "", "ex": []}, "body::lips": {"l": "lips", "def": "Lippen", "de": "", "ex": []}, "dress::brooches": {"l": "brooches", "def": "Broschen", "de": "", "ex": []}, "body::other group-related": {"l": "other group-related", "def": "Sammelkategorie fГјr Markierungen eines KГ¶rpers oder KГ¶rperteils als spezifisch fГјr eine andere Art von Gruppe als in den anderen Subkategorien spezifiziert", "de": "", "ex": []}, "dress::fronts (garment sections)": {"l": "fronts (garment sections)", "def": "Parts of a garment that cover the front half of the girth of the body, often comprising a panel or series of panels of material.вҖқ (AAT) Deutsch: Vorderseiten", "de": "", "ex": []}, "dress::headwear": {"l": "headwear", "def": "вҖңAny covering for the head.вҖқ (AAT) Hinweis: Den Wert вҖңheadwear generalвҖқ vergeben wir, wenn es allgemein um die Kopfbedeckung geht, ohne dass spezifiziert wird, welche Art von Kopfbedeckung (MГјtze, Hut o.Г„.) es ist", "de": "", "ex": ["05, 10"]}, "dress::crinolines": {"l": "crinolines", "def": "вҖңPetticoats originally made with a stiff, woven fabric of horsehair, linen, cotton, or wool. Later often used in conjunction with hoops of whalebone or steel.вҖқ (AAT)", "de": "", "ex": []}, "dress::rings": {"l": "rings", "def": "вҖңSmall circular bands worn on the finger; typically circlets of real or simulated precious metal, and frequently set with precious stones or imitations of these, intended for wearing upon the finger either as an ornament or as a token.вҖқ (AAT)", "de": "", "ex": []}, "dress::size": {"l": "size", "def": "Die GrГ¶Гҹe eines KГ¶rpers oder KГ¶rperteils", "de": "", "ex": ["Der Herr hat eine so auГҹergewГ¶hnlich оҖҖgroГҹeоҖҒ Hand!"]}, "body::gesture": {"l": "gesture", "def": "Habituelle Hand-, Arm- oder kГ¶rperliche Ausdrucksbewegungen einer Figur", "de": "", "ex": ["вҖһfuchtelte stГӨndig mit den HГӨnden\", вҖһnervГ¶se Gesten\", вҖһimmer in Bewegung\""]}, "body::dimples": {"l": "dimples", "def": "GrГјbchen an einem KГ¶rperteil als sichtbares Merkmal", "de": "", "ex": ["GrГјbchen in den Wangen"]}, "body::color-related properties": {"l": "color-related properties", "def": "Typische farbbezogene Eigenschaften wie schwach, stark, tief, warm, kalt, blass usw. (auГҹer color value, da dieser als eigene Kategorie erfasst wird). Hinweis: Wird nur zusammen mit Farbe annotiert", "de": "", "ex": []}, "body::height": {"l": "height", "def": "Die Vertikalausdehnung der Gesamtfigur (KГ¶rpergrГ¶Гҹe)", "de": "", "ex": ["оҖҖgroГҹоҖҒ gewachsen, оҖҖkleinоҖҒ von Statur, оҖҖhochоҖҒ von Gestalt"]}, "body::humps": {"l": "humps", "def": "Buckel", "de": "", "ex": []}, "body::age specific": {"l": "age specific", "def": "Spezifische Angabe des Alters", "de": "", "ex": []}, "dress::fitting immediate": {"l": "fitting immediate", "def": "", "de": "", "ex": []}, "dress::occasion/wear context": {"l": "occasion/wear context", "def": "Attributes indicating the typical occasion, situation, or context for which a garment is worn or reserved. Includes time-of-day associations, domestic contexts, ceremonial use, and special occasions. Examples: вҖһAbendkleidвҖң, вҖһSchlafrockвҖқ, вҖһSonntagskleidвҖң, вҖһZeremonialgewandвҖқ", "de": "", "ex": ["Er trug eine leichte ReisemГјtze. (Annotation: caps + occasion/wear context)"]}, "body::upper backs": {"l": "upper backs", "def": "Oberer RГјcken", "de": "", "ex": []}, "dress::gender": {"l": "gender", "  Taxonomie berГјcksichtigt sind", "de": "", "ex": []}, "dress::hems": {"l": "hems", "def": "Finished edge of a cloth article, such as a skirt, sleeve, or curtain fashioned by rolling up or folding back an edge and stitching it down.вҖқ (AAT) Deutsch: SГӨume, RГӨnder", "de": "", "ex": []}, "body::moustaches": {"l": "moustaches", "def": "Schnurrbart", "de": "", "ex": []}, "dress::vests": {"l": "vests", "def": "вҖңClose-fitting main garments extending to the waist or just below. Sleeveless and usually collarless, and often having buttons or pockets. For close-fitting main garments extending below the waistline that are usually front-buttoning and may have sleeves, that are worn over a shirt and under a coat or jacket, use \"waistcoats.\"вҖқ (AAT)", "de": "", "ex": []}, "body::mediated body attributes": {"l": "mediated body attributes", "def": "Sinnlich wahrnehmbare Attribute des KГ¶rpers, die in kognitiv vermittelter (z.B. eingeordneter, bewerteter) Form wiedergegeben werden", "de": "", "ex": []}, "dress::coattails": {"l": "coattails", "def": "вҖңRear flaps of a man's coat, such as on a tail coat, cutaway, or the like.вҖқ (AAT) Deutsch: RockschГ¶Гҹe", "de": "RockschГ¶Гҹe", "ex": []}, "dress::shape": {"l": "shape", "def": "Die Form oder charakteristische Konfiguration eines KГ¶rperteils, einschlieГҹlich seiner Konturen вҖ” als direkt sinnlicher Eindruck wiedergegeben", "de": "", "ex": ["Die eine hatte ein оҖҖrundesоҖҒ Gesicht, [...]"]}, "dress::fabric specific": {"l": "fabric specific", "def": "вҖң[Specific] Material comprising long, thin filaments with a length at least 100 times their diameter; characterized by flexibility.вҖқ (AAT)", "de": "", "ex": ["Sie trug eine einfache Robe von blauer оҖҖSeideоҖҒ", "[...] sie trug ein weiГҹes оҖҖLeinenkleidоҖҒ mit sehr viel Stickerei"]}, "body::temples": {"l": "temples", "def": "SchlГӨfen", "de": "", "ex": []}, "body::gender": {"l": "gender", "def": "Markierung eines KГ¶rpers oder KГ¶rperteils als spezifisch fГјr eine genderspezifisch konstruierte Gruppe", "de": "", "ex": []}, "body::lower legs": {"l": "lower legs", "def": "Unterschenkel", "de": "", "ex": []}, "dress::buckles": {"l": "buckles", "def": "вҖңDevices used for fastening consisting of a usually open rectangular or rounded frame and a tongue or catch attached to one side or a vertical bar attached across the center. Sometimes used alone as an ornament.вҖқ (AAT) Deutsch: Schnallen", "de": "Schnalle", "ex": []}, "dress::pattern": {"l": "pattern", "def": "вҖңEach ornamental design, either on a flat surface or in relief, composed of repeated or combined motifs.вҖқ (CC) Hinweis: Kann mit Farbe kombiniert sein. (rot und weiГҹ gestreift). Dann sind Farbe und pattern zu annotieren", "de": "", "ex": ["вҖңDie kurzen Beine waren in оҖҖgroГҹkarrierteоҖҒ Hosen gesteckt [...]вҖқ", "Nie hatte er den оҖҖgeblГјmtenоҖҒ, seidenen Schlafrock so oft getragen, wie jetzt"]}, "body::immediate body attributes": {"l": "immediate body attributes", "def": "Attribute des KГ¶rpers und seiner Teile, die durch direkte sinnliche Wahrnehmung erfassbar sind вҖ” wie Farbe, Form, Textur oder optische Eigenschaften", "de": "", "ex": []}, "body::impressiveness/presence": {"l": "impressiveness/presence", "def": "ImpressivitГӨt, Stattlichkeit eines KГ¶rpers oder KГ¶rperteils", "de": "", "ex": ["[...] einen um das Kinn gehenden оҖҖstattlichenоҖҒ Bart [...]"]}, "dress::pullovers": {"l": "pullovers", "def": "вҖңMain garments, usually made without a placket or similar opening, that must be drawn over the head to be put on.вҖқ (AAT) Hinweis: Bei uns auch fГјr Strickjacken, Cardigans o.Г„", "de": "", "ex": []}, "dress::buttons": {"l": "buttons", "def": "вҖңDisks, balls, or devices of other shape having holes or a shank by which they are sewn or secured to an article and that are used as fasteners by passing through a buttonhole or loop or a trimming.вҖқ (AAT) Deutsch: KnГ¶pfe", "de": "", "ex": []}, "body::other parts of body parts": {"l": "other parts of body parts", "def": "Sammelkategorie fГјr konkrete, sinnlich wahrnehmbare Merkmale an KГ¶rperteilen, die noch nicht in der Taxonomie berГјcksichtigt sind", "de": "", "ex": []}, "body::optical properties general": {"l": "optical properties general", "def": "Eigenschaften, die die Interaktion eines KГ¶rperteils mit Licht beschreiben", "de": "", "ex": []}, "body::age general": {"l": "age general", "def": "(GeschГӨtzte) Alter in generischer Form", "de": "", "ex": []}, "body::throats": {"l": "throats", "def": "Kehle, Vorderseite des Halses", "de": "", "ex": []}, "dress::other function-related": {"l": "other function-related", "def": "Function-related attributes not captured by the defined subcategories", "de": "", "ex": []}, "body::injuries/wounds": {"l": "injuries/wounds", "def": "Wunden, Verletzungen oder Verletzungsfolgen an einem KГ¶rperteil, die als sichtbares Merkmal beschrieben werden", "de": "", "ex": ["eine Wunde an der SchlГӨfe"]}, "body::other immediate body attributes": {"l": "other immediate body attributes", "def": "Sammelkategorie fГјr wahrnehmungs-unmittelbare Attribute, die noch nicht in der Taxonomie berГјcksichtigt sind", "de": "", "ex": []}, "body::shoulders": {"l": "shoulders", "def": "Schultern", "de": "", "ex": []}, "dress::aesthetic": {"l": "aesthetic", "def": "Attributes expressing an aesthetic judgment based on internalized standards of taste or beauty. Examples: вҖһelegantвҖң, вҖһtastefulвҖқ, вҖһstylishвҖң, вҖһuglyвҖқ", "de": "", "ex": ["sie trug ein elegantes, aber unordentlich zerknittertes NegligГ©"]}, "body::group-related general": {"l": "group-related general", "def": "Markierung eines KГ¶rpers oder KГ¶rperteils als spezifisch fГјr eine soziale Gruppe. Der Tag group-related general wird dann vergeben, wenn es um eine sehr allgemein gehaltene Gruppe, nicht um eine spezifische soziale Gruppe geht", "de": "", "ex": ["Sie sah aus, оҖҖals gehГ¶re sie nicht hierherоҖҒ", "eine оҖҖfremdartigeоҖҒ Erscheinung"]}, "dress::stitches": {"l": "stitches", "def": "вҖңRefers to portions of thread left in fabric or another material by the in and out movement of a threaded needle through the thickness or surface of the material. It also refers to the loops of thread created on a needle in knitting or other needlework.вҖқ (AAT) Deutsch: Naht", "de": "", "ex": []}, "body::freckles": {"l": "freckles", "def": "Sommersprossen an einem KГ¶rperteil als sichtbares Merkmal", "de": "", "ex": ["Sommersprossen auf der Nase"]}, "body::harmony/regularity/symmetry": {"l": "harmony/regularity/symmetry", "def": "EbenmГӨГҹigkeit, Symmetrie oder Harmonie des KГ¶rpers oder eines KГ¶rperteils, hГӨufig der GesichtszГјge. HГӨufig mit wertender Komponente verbunden", "de": "", "ex": []}, "dress::anklets": {"l": "anklets", "def": "вҖңOrnamental bands, rings, or chains worn around the ankle.вҖқ (AAT)", "de": "", "ex": []}, "dress::accessories carried": {"l": "accessories carried", "def": "вҖңItems that do not form the primary articles of clothing, but are instead the smaller articles of dress, and that are carried, as opposed to worn on the body.вҖқ (AAT) Hinweis: Den Wert accessories carried general vergeben wir, wenn es allgemein um solche Accessories geht", "de": "", "ex": []}, "dress::colors level 1": {"l": "colors level 1", "def": "Mit colors level 1 annotieren wir basale, einfache, also nicht zusammengesetzte FarbtГ¶ne: blau, rot, gelb, grГјn, orange, pink, lila, tГјrkis, schwarz, weiГҹ, grau, braun sowie deren Synonyme und analoge AusdrГјcke. Hinweis: Sowohl FarbtГ¶ne des Levels 1 als auch des Levels 2 kГ¶nnen zusГӨtzlich hinsichtlich des color value oder der anderen farbbezogenen Attribute nГӨher spezifiziert werden", "de": "", "ex": ["оҖҖschwarzesоҖҒ Haar", "оҖҖblondeоҖҒ Haare"]}, "body::fingers": {"l": "fingers", "def": "Finger", "de": "", "ex": []}, "body::averageness/conventionality": {"l": "averageness/conventionality", "def": "Normentsprechung bzw. AuffГӨlligkeit eines KГ¶rpers oder KГ¶rperteils. Orthogonal zu attractiveness вҖ” ein unkonventionelles Gesicht kann attraktiv oder unattraktiv sein. HГӨufig mit wertender Komponente verbunden", "de": "", "ex": ["Der Herr hat eine so оҖҖauГҹergewГ¶hnlichоҖҒ groГҹe Hand! [...] ein Gesicht von оҖҖeigenartigerоҖҒ SchГ¶nheitоҖҖ.оҖҒ"]}, "body::lower backs": {"l": "lower backs", "def": "Unterer RГјcken", "de": "", "ex": []}, "body::nipples": {"l": "nipples", "def": "Brustwarzen", "de": "", "ex": []}, "dress::technique": {"l": "technique", "def": "Art und Weise der Herstellung der Komponente oder des Attributs, z.B. handgemacht, gestrickt, genГӨht, gestickt usw", "de": "", "ex": ["вҖң[...] die blaue Jacke an den RГӨndern mit bunter Seide оҖҖgesticktоҖҒ [...]вҖқ Hinweis zum", "вҖңgesticktвҖқ hier als trimming und technique annotiert"]}, "body::knees": {"l": "knees", "def": "Knie", "de": "", "ex": []}, "body::other parts of upper extremities": {"l": "other parts of upper extremities", "def": "Sammelkategorie fГјr Teile der oberen ExtremitГӨten, die noch nicht in der Taxonomie berГјcksichtigt sind", "de": "", "ex": []}, "body::class/occupation": {"l": "class/occupation", "def": "Markierung eines KГ¶rpers oder KГ¶rperteils als spezifisch fГјr eine als berufs- oder klassenspezifisch konstruierte Gruppe", "de": "", "ex": []}, "body::foreheads": {"l": "foreheads", "def": "Stirn", "de": "", "ex": []}, "body::cheeks": {"l": "cheeks", "def": "Wangen", "de": "", "ex": []}, "dress::other immediate supplement attributes": {"l": "other immediate supplement attributes", "def": "Sammelkategorie fГјr Informationen Гјber rohe Attribute die bislang nicht in der Taxonomie berГјcksichtigt sind", "de": "", "ex": []}, "dress::function-related general": {"l": "function-related general", "def": "Attributes indicating the intended purpose, occasion, or context for which a garment is worn. The function is not directly visible but conventionally associated with the garment type", "de": "", "ex": []}, "body::muscles": {"l": "muscles", "def": "Muskeln als durch die KГ¶rperoberflГӨche sichtbares oder tastbares Merkmal an einem KГ¶rperteil. Hinweis: Muskeln sind anatomisch innen, werden aber durch ihre Kontur wahrnehmbar", "de": "", "ex": ["die Muskeln seiner Unterarme zeichneten sich ab"]}, "body::voice": {"l": "voice", "def": "", "de": "", "ex": []}, "dress::watches": {"l": "watches", "def": "вҖңTimepieces small and convenient enough to be carried about on a person.вҖқ (AAT)", "de": "", "ex": []}, "dress::other body-related": {"l": "other body-related", "def": "Body-related attributes not captured by the defined subcategories", "de": "", "ex": []}, "body::brightness": {"l": "brightness", "def": "Der Grad der Helligkeit oder Dunkelheit einer KГ¶rperoberflГӨche, unabhГӨngig von der Farbe", "de": "", "ex": []}, "body::voluptuousness": {"l": "voluptuousness", "def": "", "de": "", "ex": []}, "body::eyelids": {"l": "eyelids", "def": "Augenlider", "de": "", "ex": []}, "body::jaws": {"l": "jaws", "def": "Kiefer", "de": "", "ex": []}, "dress::color-related properties": {"l": "color-related properties", "def": "Typische farbbezogene Eigenschaften wie schwach, stark, tief, warm, kalt, blass usw. (auГҹer color value, da dieser als eigene Kategorie erfasst wird). Hinweis: Wird nur zusammen mit Farbe annotiert", "de": "", "ex": []}, "dress::modernity": {"l": "modernity", "def": "Attributes situating a garment with respect to current fashion вҖ” whether in or out of fashion. Examples: вҖһfashionableвҖң, вҖһГ  la modeвҖқ, вҖһold-fashionedвҖң, вҖһoutmodedвҖқ", "de": "", "ex": []}, "body::other movement": {"l": "other movement", "def": "Restkategorie fГјr habituelle Bewegungsbeschreibungen, die nicht klar unter gait, gesture oder posture fallen", "de": "", "ex": []}, "body::palms of hand": {"l": "palms of hand", "def": "HandflГӨchen", "de": "", "ex": []}, "dress::collars": {"l": "collars", "def": "вҖңShaped articles worn at the neckline of a garment, either separate or attached.вҖқ (AAT) Hinweis: Wenn ein Kragen als eigenstГӨndiges Accessoire getragen wird annotieren wir ihn in der Kategorie accessories worn nicht als Teil eines KleidungsstГјcks. Deutsch: KrГӨgen", "de": "", "ex": []}, "body::eyebrows": {"l": "eyebrows", "def": "Augenbrauen", "de": "", "ex": []}, "body::armpits": {"l": "armpits", "def": "AchselhГ¶hlen", "de": "", "ex": []}, "body::wrists": {"l": "wrists", "def": "Handgelenke", "de": "", "ex": []}, "dress::civilian": {"l": "civilian", "def": "Zivilkleidung im Kontrast zur Uniform вҖ” explizit nicht-uniformierte Kleidung im Rollenkontext (вҖһin Zivil\")", "de": "", "ex": []}, "dress::suits": {"l": "suits", "def": "вҖңSets of two or more garments made to harmonize or match in color. Also, any costume designed to be worn for a special purpose or under particular conditions, such as a space suit or a snowsuit.вҖқ (AAT)", "de": "", "ex": []}, "body::other optical properties": {"l": "other optical properties", "def": "Andere optische Eigenschaften als brightness, also z.B. Glanz, Mattheit, Transparenz", "de": "", "ex": ["оҖҖglГӨnzendeоҖҒ Haut"]}, "dress::cuff links": {"l": "cuff links", "def": "вҖңRectangular bands, often made of cloth or metal, made to hold cuffs of garments in place. At each end is a button or metal pin to attach the band to the cuff's buttonhole.вҖқ (AAT)", "de": "", "ex": []}, "body::upper arms": {"l": "upper arms", "def": "Oberarme", "de": "", "ex": []}, "dress::economic/value": {"l": "economic/value", "def": "Attributes referring to the monetary value or economic status signaled by clothing. Examples: вҖһexpensiveвҖң, вҖһcheapвҖқ, вҖһaffordableвҖң, вҖһpricelessвҖқ", "de": "", "ex": ["[вҖҰ] und du wirst doch nicht die kostbaren GewГӨnder alle tragen [вҖҰ]"]}, "dress::colors level 2": {"l": "colors level 2", "def": "Hierunter fassen wir alle hinsichtlich des Farbtons spezifischeren AusdrГјcke als die in color level 1. HГӨufig, aber nicht immer sind das zusammengesetzte AusdrГјcke, z.B. goldblond, pechschwarz, aschgrau, kupferrot, elfenbeinfarben", "de": "", "ex": ["Sie hatte оҖҖpechschwarzesоҖҒ Haar", "[...] die Farbe des Haares war оҖҖaschblond оҖҒ[...]"]}, "body::earlobes": {"l": "earlobes", "def": "OhrlГӨppchen", "de": "", "ex": []}, "dress::component accessories": {"l": "component accessories", "def": "zum KleidungsstГјck gehГ¶rige objekthafte accessories (Schleifen, RГјschen etc.)", "de": "", "ex": []}, "dress::boots": {"l": "boots", "def": "вҖңFootwear, the leg of which extends above the ankle joint.вҖқ (AAT) Er hatte seinen Anzug gewechselt, trug kurze Beinkleider und Stulpenstiefel, [...]", "de": "", "ex": []}, "body::colors general": {"l": "colors general", "def": "FarbtГ¶ne. Hinweis: Den Wert colors general vergeben wir, wenn wir erfahren, dass ein Farbton vorliegt aber nicht welcher", "de": "", "ex": []}, "dress::bands/ribbons": {"l": "bands/ribbons", "def": "Deutsch: BГӨnder SchnГјre", "de": "", "ex": []}, "dress::brightness": {"l": "brightness", "def": "Der Grad der Helligkeit oder Dunkelheit einer KГ¶rperoberflГӨche, unabhГӨngig von der Farbe", "de": "", "ex": []}, "body::shins": {"l": "shins", "def": "Schienbeine", "de": "", "ex": []}, "body::color value": {"l": "color value", "def": "Der Grad der Helligkeit oder Dunkelheit eines Farbtons. Wird nur zusammen mit Farbe annotiert. Hinweis: Wenn es um Helligkeit/Dunkelheit eines KГ¶rperteils jenseits der Farbe geht, wird brightness annotiert", "de": "", "ex": ["оҖҖdunkelbraunes оҖҒHaar"]}, "dress::way of wearing immediate": {"l": "way of wearing immediate", "def": "Art und Weise, wie das KleidungsstГјck oder KleidungsteilstГјck von der Figur getragen wird. Hinweis: Placement und andere eigene Kategorien, bei denen man ebenfalls etwas Гјber die Art und Weise des Getragen werdens erfГӨhrt (z.B. placement9 werden eigens erfasst und nicht zusГӨtzlich mit way of wearing", "de": "", "ex": ["Er war so ein Mann, der gerne den Rock оҖҖweit offenоҖҒ trГӨgt, [...]"]}, "dress::cut": {"l": "cut", "def": "Attributes characterizing a garment by its cut or tailoring as a style feature, beyond its basic category name. Examples: вҖһwell-cutвҖң, вҖһclose-cutвҖқ, вҖһflowing\"", "de": "", "ex": []}, "body::shape": {"l": "shape", "def": "Die Form oder charakteristische Konfiguration eines KГ¶rperteils, einschlieГҹlich seiner Konturen вҖ” als direkt sinnlicher Eindruck wiedergegeben", "de": "", "ex": ["Die eine hatte ein оҖҖrundesоҖҒ Gesicht, [...]"]}, "dress::supplement": {"l": "supplement", "def": "Unter вҖңSupplementвҖқ verstehen wir den Teil des in der Regel intentional gestalteten ГӨuГҹeren Erscheinungsbildes, bei dem dem KГ¶rper etwas GegenstГӨndliches вҖҳhinzugefГјgtвҖҷ wird вҖ“ Kleidung oder Accessories. Den Wert вҖңsupplement generalвҖқ vergeben wir, wenn es um die Kleidung der Figur insgesamt geht, wobei wir annehmen, dass sowohl Accessories und Clothing (s.u.) gemeint sind oder gemeint sein kГ¶nnten", "de": "", "ex": ["Die RГӨuber trugen die оҖҖTrachtоҖҒ der Hirten, [...] ErlГӨuterung: Wir kГ¶nnen nicht ausschlieГҹen, dass zur Tracht der Hirten auch Accessories gehГ¶ren und annotieren deshalb supplement general", "Er trug die оҖҖKleidungоҖҒ eines WestlГӨufers, hatte eine Flinte auf dem RГјcken hГӨngen und in dem GГјrtel einen Revolver, ein Bowiemesser und вҖ“ вҖ“ вҖ“ was noch mehr stecken? ErlГӨuterung: Auch hier kГ¶nnen wir nicht ausschlieГҹen, dass zur Kleidung der WestlГӨufer auch Accessoires gehГ¶ren"]}, "dress::other material": {"l": "other material", "def": "Alle Materialien auГҹer Stoffe, z.B. Leder, Stroh, Pelz", "de": "", "ex": ["xyz"]}, "body::knuckles": {"l": "knuckles", "def": "FingerknГ¶chel", "de": "", "ex": []}, "dress::corsets": {"l": "corsets", "def": "вҖңSmoothly fitted undergarments extending from or below the bust down to the waist or below, stiffened by strips of steel or whalebone, or with casing for a busk, sometimes limbered by elastic goring, sometimes tightened by lacing, and fastened by hooks. It is usually worn by women for support and molding of the figure including the ribcage and possibly the hips.вҖқ (AAT)", "de": "", "ex": []}, "dress::accessories": {"l": "accessories", "def": "вҖңItems that do not form the primary articles of clothing, but are instead the smaller articles of dress, such as [...] gloves, [...] jewelry, etc.вҖқ (AAT) Hinweis: Im AAT werden auch Schuhe und Kopfbedeckungen zu den Accessories gezГӨhlt. Hier werden sie dagegen dem Clothing zugerechnet. Hinweis: Der Wert accessories general wird vergeben, wenn es allgemein um die Accessories geht", "de": "", "ex": []}, "dress::other optical properties": {"l": "other optical properties", "def": "Andere optische Eigenschaften als brightness, also z.B. Glanz, Mattheit, Transparenz", "de": "", "ex": ["оҖҖglГӨnzendeоҖҒ Haut"]}, "dress::other mediated supplement attributes": {"l": "other mediated supplement attributes", "def": "Attributes distant to perception that do not fit any of the defined categories", "de": "", "ex": []}, "body::nape of neck": {"l": "nape of neck", "def": "Nacken", "de": "", "ex": []}, "dress::tears": {"l": "tears", "def": "Risse in einem KleidungsstГјck als lokalisierbares Merkmal. Deutsch: Risse", "de": "Risse", "ex": []}, "dress::thickness": {"l": "thickness", "def": "Die Dicke oder DГјnne eines KГ¶rperteils", "de": "", "ex": ["Wirklich, er hatte es nicht bedacht, daГҹ die Base selber einen оҖҖdickenоҖҒ Hals hatte [...]"]}, "dress::other accessories worn": {"l": "other accessories worn", "def": "", "de": "", "ex": []}, "dress::caps": {"l": "caps", "def": "вҖңBrimless head coverings, often made with a visor.вҖқ (AAT)", "de": "", "ex": ["[...] auf dem Kopf trug sie eine оҖҖKarmesinmГјtzeоҖҒ von Sammet [...]"]}, "dress::stains": {"l": "stains", "def": "Flecken auf einem KleidungsstГјck als lokalisierbares Merkmal. Deutsch: Flecken", "de": "Flecken", "ex": []}, "dress::sandalettes/sandals": {"l": "sandalettes/sandals", "def": "вҖңShoes consisting essentially of a sole fastened to the foot by straps, strips, or cords.вҖқ (AAT)", "de": "", "ex": []}, "body::other mediated body attributes": {"l": "other mediated body attributes", "def": "Sammelkategorie fГјr wahrnehmungsferne Attribute, die sich keiner der obigen Subkategorien zuordnen lassen", "de": "", "ex": []}, "dress::closure": {"l": "closure", "def": "вҖңDevices that fasten or hold together separate parts of objects made from textiles.вҖқ (AAT) Hinweis: Definition bezieht sich dort auf вҖңfastenersвҖқ, in CC wird closure als Oberbegriff fГјr KnГ¶pfe, ReiГҹverschluss usw. verwendet, in AAT fasteners; ich betrachte closure und fasteners hier daher als synonym. Hinweis: ausgenommen buttons, diese selbst", "de": "", "ex": []}, "dress::body-related general": {"l": "body-related general", "def": "Attributes describing the relationship between a garment and the body of the wearer, including fit and the effect on the bodyвҖҷs perceived appearance", "de": "", "ex": []}, "body::upper extremities": {"l": "upper extremities", "def": "Region obere ExtremitГӨten вҖ” Гјbergeordnete Kategorie fГјr Arme und HГӨnde", "de": "", "ex": []}, "dress::clothing": {"l": "clothing", "def": "вҖңCoverings for the torso, limbs, hands, feet, and head for warmth, fashion, or to cover nudity. It generally excludes other items of costume such as jewelry, crowns, and other accessories that are purely decorative or symbolic and have no practical function.вҖқ (AAT) Hinweis: Der Wert clothing general wird vergeben, wenn es allgemein um die Kleidung, aber nicht um die Accessories geht", "de": "", "ex": []}, "body::beards": {"l": "beards", "def": "Bart", "de": "", "ex": []}, "dress::mourning": {"l": "mourning", "def": "Trauer", "de": "", "ex": []}, "body::placement": {"l": "placement", "def": "Die Stelle, an der ein KГ¶rperteil oder ein Merkmal an einem anderen KГ¶rperteil lokalisiert ist", "de": "", "ex": ["ein Muttermal оҖҖauf der linken WangeоҖҒ"]}, "body::nobleness": {"l": "nobleness", "def": "Markierung eines KГ¶rpers oder seiner Teile als nobel oder edel (bzw. unedel usw.). Abgrenzung zu fineness: Bei fineness geht es um die вҖңFeinheitвҖқ oder вҖңZierlichkeitвҖқ eines KГ¶rperteils, kann muss aber nicht zusammen mit nobleness auftreten. Abgrenzung zu class/occupation: Eine Verwandtschaft gibt es auch zu class/occupation, dort geht es eher um die Betonung der GruppenzugehГ¶rigkeit", "de": "", "ex": ["Er hatte ein schmales, оҖҖedlesоҖҒ, etwas blasses Gesicht"]}, "exterior": {"l": "exterior", "def": "", "de": "", "ex": []}, "dress::gaiters": {"l": "gaiters", "def": "вҖңCoverings of cloth, leather, or similar material worn over the ankle and sometimes lower leg.вҖқ (AAT)", "de": "", "ex": []}, "body::fineness": {"l": "fineness", "def": "Feinheit bzw. Zartheit oder Zierlichkeit des KГ¶rpers oder seiner Teile, insbesondere der GesichtszГјge. HГӨufig mit wertender Komponente verbunden", "de": "", "ex": ["Und dann hatte sie so оҖҖfeineоҖҒ, weiГҹe Finger und Handgelenke [...]"]}, "body::posture": {"l": "posture", "def": "Habituelle KГ¶rperhaltung (Stand- und Sitzhaltung, Schulter- und RГјckenfГјhrung)", "de": "", "ex": ["aufrechte Haltung, mit hГӨngenden Schultern, gebeugt, stets gerade. Abgrenzung zu shape (close attribute): Eine gebeugte Haltung ist habituell-dynamisch (posture); ein gekrГјmmter RГјcken als anatomisches Merkmal ist statisch und wird als shape am KГ¶rperteil backs annotiert. Faustregel: Wenn die Beschreibung eine Art sich zu halten meint, ist es posture; wenn sie eine Form/Beschaffenheit des KГ¶rpers meint, ist es shape"]}, "body::noses": {"l": "noses", "def": "Nase", "de": "", "ex": []}, "dress::flowers": {"l": "flowers", "def": "Blumen, die als eigenes Accessoire getragen werden", "de": "", "ex": []}, "body::inner qualities": {"l": "inner qualities", "def": "Inneres Merkmal (Temperament, Charakter, GemГјtslage), das explizit an die AuГҹenseite gebunden wird. Hinweis: Wir meinen hier nur solche FГӨlle, in denen innere Eigenschaften explizit an die sinnlich wahrnehmbare AuГҹenseite geknГјpft werden. вҖһEr war ein stolzer Mensch\" fГӨllt damit nicht in diese Kategorie, вҖһEr hatte ein stolzes Gesicht\" dagegen schon", "de": "", "ex"
