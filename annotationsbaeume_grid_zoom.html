nung und mit <strong>ausgeprägten</strong> <strong>Formen</strong>, hatte <strong>schwarzes</strong> <strong>Haar</strong> und ein <strong>Gesicht</strong> von <strong>eigenartiger</strong> <strong>Schönheit</strong>, mit dem <strong>Teint</strong> einer <strong>Südländerin</strong>.", "Es hatte ein <strong>hübsches</strong> <strong>Gesicht</strong> und <strong>ein Paar mächtige Augen</strong>, die noch <strong>viel heller</strong> <strong>blitzten</strong> als seines Röschens Augen; die <strong>erdbeerroten</strong> <strong>Lippen</strong> <strong>lachten</strong> so häufig wie seiner Pfarrschwestern Lippen; aber nur wenn sie den jungen Herrn anlachten, hätte Dezimus an seiner Pastormutter Lachen denken können.", "Sie hat <strong>wunderbar</strong> <strong>schöne</strong> <strong>Hände</strong>, <strong>gross</strong> und <strong>voll</strong>, aber <strong>weich</strong>, und hat einen so <strong>warmen</strong> <strong>festen</strong> <strong>Druck</strong>.", "Er betrachtete ihn lange: er hatte zurückgestrichenes <strong>blondes</strong> <strong>Haar</strong>, <strong>regelmäßige</strong> <strong>Züge</strong>, <strong>die an manches antike Profil in den Werken der Bildhauer erinnern mochten</strong>, doch ein <strong>unstetes</strong> <strong>Auge</strong>, einen etwas <strong>schielenden</strong> <strong>Blick</strong>.", "Dieser Mann hatte bereits <strong>graue</strong> <strong>Haare</strong>, ein <strong>stark gebräuntes</strong>, mit <strong>vielen</strong> <strong>Falten</strong> und <strong>einigen</strong> <strong>tiefen</strong> <strong>Narben bedecktes</strong> <strong>Gesicht</strong>, trug einen lang herabhängenden Schnurrbart, dessen Enden er häufig mit der rechten Hand kräuselte, und las mit großer Aufmerksamkeit in einem Buche, deren mehrere auf einem in die Wand befestigten Regale in guten, wohl erhaltenen Einbänden standen.", "Nach ihrer Beschreibung hatte er ein <strong>mächtiges</strong>, <strong>brutales</strong> <strong>Gesicht</strong>, ein uf der flinken Zunge; der zweite, ein bedächtiger Junge mit <strong>hellbraunen</strong> <strong>Locken</strong>, <strong>schmächtig</strong>, obschon <strong>gutgewachsen</strong>, sprach nicht gar viel, betrachtete aber, was ihn umgab, mit verständiger Aufmerksamkeit.", "Jolante wäre <strong>hübsch</strong> mit diesen <strong>schönbewimperten</strong> <strong>Augen</strong> und dem <strong>vollen</strong>, <strong>farbigbraunen</strong> <strong>Haar</strong>, wenn sie nicht einen <strong>ganz kleinen</strong> <strong>Höcker</strong> hätte.", "Sie hat ein <strong>feines</strong> <strong>Gesicht</strong>, ihre <strong>schönen</strong> <strong>blauen</strong> <strong>Augen</strong> <strong>leuchten</strong> immer <strong>freundlich</strong>, ihr <strong>blonder</strong> <strong>Scheitel</strong> sieht <strong>so goldig</strong> aus, dabei hat sie eine <strong>stattliche</strong> <strong>Figur</strong>.", "Sie war <strong>sehr hoch</strong> von <strong>Gestalt</strong>, ihre <strong>Züge</strong> <strong>fein</strong> und <strong>regelmäßig</strong>, ihr <strong>Wuchs wie der einer Sylphide</strong>, ihr <strong>Kleid</strong> <strong>so weit ausgeschnitten</strong>, daß man die <strong>Brüste</strong>, welche ihr <strong>Leibchen</strong> <strong>beinahe sprengten</strong>, bis an die <strong>Knöspchen</strong> sehen konnte; da sie einen <strong>sehr schönen</strong> <strong>kleinen</strong> <strong>Fuß</strong> hatte, steckte sie ihn vor.", "<strong>Groß</strong> und <strong>kräftig gebaut</strong>, hatte er ein <strong>ovales</strong>, <strong>volles</strong> <strong>Gesicht</strong> mit einer <strong>Abplattung</strong> in der Gegend der <strong>Backenknochen</strong>, eine <strong>kurze</strong>, <strong>fast stumpfe</strong> <strong>Nase</strong>, <strong>kleine</strong> <strong>Augen</strong> und ein <strong>rundes</strong> <strong>Kinn</strong>.", "Der Eindruck, den des Obersten <strong>Züge</strong> auf ihn machten, war eben <strong>kein sehr günstiger</strong>; er hatte ein <strong>entschieden gemeines</strong>, <strong>sinnliches</strong> <strong>Gesicht</strong>, dem die <strong>kleinen</strong> <strong>Augen</strong>, die <strong>borstigen</strong> <strong>Brauen</strong> und die <strong>niedere</strong> <strong>Stirn</strong> noch etwas <strong>Heimliches</strong> und <strong>Verstecktes</strong> gaben, übrigens war es eine <strong>kräftige</strong> <strong>Gestalt</strong>, und er schien auch an kräftige Kost gewöhnt, denn das Selterswasser ließ er unberührt stehen, während er den Kognak trank, sich dann noch einen zweiten und einen dritten geben ließ.", "Er hat ein <strong>gutmütiges</strong>, <strong>hageres</strong>, <strong>dunkelbraungebranntes</strong> <strong>Gesicht</strong>, <strong>glanzlose</strong>, <strong>schwarze</strong> <strong>Augen</strong>, eine <strong>große Menge</strong> <strong>schwarzer</strong>, <strong>schweißnasser</strong> <strong>Haare</strong> und eine <strong>glühende</strong> <strong>Adlernase</strong>.", "Eine Weile nachher erschien auf dem Wege, der aus dem Dorfe nach dem Schloß führte, ein <strong>stattlicher</strong>, <strong>wohlbeleibter</strong> Mann im <strong>Reiserock</strong>, sein <strong>Gesicht</strong>, <strong>voll</strong> und <strong>breit</strong> und <strong>lebhaft</strong> <strong>geröthet</strong>, drückte Wohlwollen aus; er nahm den <strong>Hut</strong> ab, da es sehr warm war, und zeigte, daß er <strong>blondes</strong> <strong>Haar</strong> hatte, die <strong>Augen</strong> erschienen <strong>klein</strong>, <strong>blau</strong> und <strong>klug</strong>.", "Der Mann war <strong>ungefähr ein naher Sechziger</strong>, sein <strong>Schädel</strong> eine <strong>schwere</strong> und <strong>unförmliche Masse</strong>, seine <strong>Züge</strong> <strong>grob geschnitten</strong>, das <strong>Gesicht</strong> <strong>aufgetrieben</strong>, <strong>wulstig</strong>, voll <strong>Warzen</strong> und <strong>beulenartiger Unebenheiten</strong>, <strong>welche durch die Ideenverbindung mit Krankheitsursachen noch zurückstoßender wurden</strong>; er hatte eine <strong>niedrige</strong> <strong>Stirn</strong>, eine <strong>platte</strong> <strong>Nase</strong>, einen <strong>dicken</strong> <strong>brutalen</strong> <strong>Mund</strong> und <strong>hervorragende</strong> <strong>Backenknochen</strong>.", "Die eine der beiden Damen mochte <strong>etwa siebenundzwanzig bis achtundzwanzig Jahre alt</strong> sein, sie hatte ein <strong>klassisch-edles</strong> <strong>Gesicht</strong> mit <strong>großen</strong> <strong>dunkeln</strong> <strong>Augen</strong>, aus deren <strong>kalten</strong> und <strong>stolzen</strong> <strong>Blicken</strong> doch zuweilen <strong>eine wie aus verborgener Tiefe heraufflammende Glut hervorleuchtete</strong>; ein <strong>schwarzes</strong> <strong>Spitzentuch</strong> <strong>umschloß leicht und anmutig ihr reiches schwarzes Haar</strong>, ihr <strong>dunkel</strong> <strong>violettes</strong> <strong>Seidenkleid</strong> <strong>hob die üppigen und doch edlen Formen ihrer Gestalt hervor</strong>, eine <strong>Agraffe</strong> mit einem <strong>prachtvollen</strong> <strong>Solitär</strong> hielt als einziger <strong>Schmuck</strong> ein <strong>schwarzes</strong> <strong>Sammethalsband</strong> zusammen."];
const nums = [18,41,0,10,1,46,49,9,37,25,32,39,4,2,16,7,26,30,27,35,44,33,43,22,29,47,5,23,31,28,38,15,14,19,34,48,13,42,21,3,11,24,17,20,6,40,45,12,8,36];
const colorMap = {"body_component":"#c9a052","body/immediate":"#d4b870","body/mediated":"#7a9cc0","supp_component":"#c0504d","supp/immediate":"#d4913a","supp/mediated":"#7da8a0","Mention":"#333333","group":"#e8e4df"};

// Legend
const legendData = [
  {color:"#c9a052",label:"Body-Komponenten"},{color:"#d4b870",label:"Body immediate"},
  {color:"#7a9cc0",label:"Body mediated"},{color:"#c0504d",label:"Supplement-Komponenten"},
  {color:"#d4913a",label:"Supplement immediate"},{color:"#7da8a0",label:"Supplement mediated"}
];
const legendEl = document.getElementById("legend");

  legendEl.innerHTML += `<div class="legend-item"><div class="legend-swatch" style="background:${color}"></div><span>${label}</span></div>`;
});

// Tree rendering
function nodeColor(d) { return colorMap[d.data.category] || "#ccc"; }
const nodeW=52, nodeH=32, margin={top:12,right:60,bottom:12,left:60};
const grid = document.getElementById("grid");

allTrees.forEach((trees, idx) => {
  const cell = document.createElement("div");
  cell.className = "cell";
  const numDiv = document.createElement("div");
  numDiv.className = "cell-num";
  numDiv.textContent = "Satz " + nums[idx];
  cell.appendChild(numDiv);
  const labelDiv = document.createElement("div");
  labelDiv.className = "cell-label";
  labelDiv.innerHTML = txts[idx];
  cell.appendChild(labelDiv);
  const container = document.createElement("div");
  container.className = "cell-trees";
  cell.appendChild(container);

  if (!trees || trees.length === 0) {
    const empty = document.createElement("div");
    empty.style.cssText = "font-size:9px;color:#aaa;font-style:italic";
    empty.textContent = "(keine Annotationen)";
    container.appendChild(empty);
  } else {
    trees.forEach(treeData => {
      const root = d3.hierarchy(treeData);
      const treeLayout = d3.tree().nodeSize([nodeW, nodeH]);
      treeLayout(root);
      let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
      root.each(d => { if(d.x<x0)x0=d.x; if(d.x>x1)x1=d.x; if(d.y<y0)y0=d.y; if(d.y>y1)y1=d.y; });
      const w=(x1-x0)+margin.left+margin.right+nodeW;
      const h=(y1-y0)+margin.top+margin.bottom+nodeH+28;
      const svg=d3.select(container).append("svg").attr("width",w).attr("height",h)
        .style("overflow","visible").style("display","block");
      const g=svg.append("g").attr("transform",`translate(${margin.left-x0+nodeW/2},${margin.top})`);
      g.selectAll(".link").data(root.links()).enter().append("path").attr("class","link")
        .attr("d",d3.linkVertical().x(d=>d.x).y(d=>d.y));
      const node=g.selectAll(".node").data(root.descendants()).enter()
        .append("g").attr("class","node").attr("transform",d=>`translate(${d.x},${d.y})`);
      node.append("circle").attr("r",4)
        .style("fill",d=>nodeColor(d))
        .style("stroke",d=>d3.color(nodeColor(d)).darker(0.5))
        .style("stroke-width","1px");
      node.filter(d=>d.data.value).append("text")
        .attr("text-anchor","middle").attr("y",-7)
        .style("font-size","4.5px").style("fill","#999").style("letter-spacing","0.04em")
        .text(d=>d.data.value.length>18?d.data.value.slice(0,16)+"…":d.data.value);
      node.each(function(d) {
        const words=d.data.name.split(" ");
        const maxC=10;
        let lines=[],cur="";
        words.forEach(w=>{ if((cur+" "+w).trim().length>maxC&&cur){lines.push(cur.trim());cur=w;}else{cur=(cur+" "+w).trim();} });
        if(cur)lines.push(cur.trim());
        const txt=d3.select(this).append("text").attr("text-anchor","middle");
        lines.forEach((line,i)=>txt.append("tspan").attr("x",0).attr("dy",i===0?10:7).text(line));
      });
    });
  }
  grid.appendChild(cell);
});

// Zoom / Pan
const viewport = document.getElementById("viewport");
const canvas   = document.getElementById("canvas");
const zoomInfo = document.getElementById("zoom-info");

let scale=1, tx=0, ty=0;
const minScale=0.15, maxScale=5;

function applyTransform() {
  canvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  zoomInfo.textContent = Math.round(scale*100)+"%";
}

viewport.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
  const newScale = Math.min(maxScale, Math.max(minScale, scale*factor));
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  tx = mx - (mx - tx) * (newScale/scale);
  ty = my - (my - ty) * (newScale/scale);
  scale = newScale;
  applyTransform();
}, {passive:false});

let dragging=false, startX, startY, startTx, startTy;

viewport.addEventListener("mousedown", e => {
  dragging=true;
  startX=e.clientX; startY=e.clientY;
  startTx=tx; startTy=ty;
  viewport.classList.add("dragging");
});
window.addEventListener("mousemove", e => {
  if(!dragging) return;
  tx = startTx + (e.clientX-startX);
  ty = startTy + (e.clientY-startY);
  applyTransform();
});
window.addEventListener("mouseup", () => {
  dragging=false;
  viewport.classList.remove("dragging");
});

document.getElementById("reset-btn").addEventListener("click", () => {
  scale=1; tx=0; ty=0; applyTransform();
});

applyTransform();
</script>
